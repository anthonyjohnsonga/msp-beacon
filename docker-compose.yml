services:
  msp-beacon:
    image: ghcr.io/anthonyjohnsonga/msp-beacon:latest
    container_name: msp-beacon
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./config:/data/config
    # environment:
    #   # Optional: preset the app password. If unset, you'll be prompted to
    #   # create one on first load. The password also persists in ./data/auth.json.
    #   - BEACON_PASSWORD=change-me
    #   # Optional: hours between automatic link health sweeps (default 6, 0 disables).
    #   - HEALTH_CHECK_HOURS=6
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.50'
