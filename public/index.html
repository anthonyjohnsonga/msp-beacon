<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSP Beacon</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/dist/tabler-icons.min.css">
<style>
:root {
  --bg0: #0d1117;
  --bg1: #161b22;
  --bg2: #1c2128;
  --bg3: #21262d;
  --g1: #E1F5EE;
  --g2: #9FE1CB;
  --g3: #5DCAA5;
  --g4: #1D9E75;
  --g5: #0F6E56;
  --g6: #085041;
  --text0: #e6edf3;
  --text1: #8b949e;
  --text2: #6e7681;
  --border0: #30363d;
  --g4-glow: rgba(29,158,117,.15);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg0); color: var(--text0); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem 3rem; }
.app-header { display: flex; align-items: center; gap: 10px; padding: 1.25rem 0 0; margin-bottom: 4px; }
.app-header i { font-size: 24px; color: var(--g3); }
.app-header span { font-size: 20px; font-weight: 600; color: var(--g2); }
.toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; padding: 1rem 0 0.75rem; border-bottom: 1.5px solid var(--g5); margin-bottom: 1rem; }
input[type=text] { height: 36px; padding: 0 10px; border-radius: 8px; border: 0.5px solid var(--border0); background: var(--bg2); color: var(--text0); font-size: 14px; font-family: inherit; }
input[type=text]:focus { outline: none; border-color: var(--g4); box-shadow: 0 0 0 2px var(--g4-glow); }
select { height: 36px; padding: 0 10px; border-radius: 8px; border: 0.5px solid var(--border0); background: var(--bg2); color: var(--text0); font-size: 14px; cursor: pointer; font-family: inherit; }
select:focus { outline: none; border-color: var(--g4); }
.search-wrap { position: relative; display: flex; align-items: center; flex: 1; min-width: 160px; }
.search-wrap input[type=text] { width: 100%; padding-left: 32px; padding-right: 30px; }
.search-icon { position: absolute; left: 10px; font-size: 15px; color: var(--text2); pointer-events: none; }
.search-clear { position: absolute; right: 6px; width: 22px; height: 22px; border-radius: 50%; border: none; background: var(--bg3); color: var(--text1); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; padding: 0; }
.search-clear:hover { background: var(--g5); color: #fff; }
.btn { display: flex; align-items: center; gap: 6px; white-space: nowrap; padding: 0 14px; height: 36px; border-radius: 8px; border: 0.5px solid var(--border0); background: var(--bg2); color: var(--text0); font-size: 14px; cursor: pointer; font-weight: 500; font-family: inherit; }
.btn:hover { background: var(--bg3); border-color: var(--g5); }
.btn-primary { background: var(--g5); color: #fff; border-color: var(--g6); }
.btn-primary:hover { background: var(--g6); }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(var(--card-min-width, 220px), 1fr)); gap: var(--card-gap, 12px); padding-bottom: 1.5rem; }
.link-list { display: flex; flex-direction: column; gap: 2px; padding-bottom: 1.5rem; }
.card-row { background: var(--bg1); border: 0.5px solid var(--border0); border-radius: 8px; padding: 8px 12px; cursor: pointer; transition: border-color .15s; display: flex; align-items: center; gap: 10px; position: relative; min-width: 0; }
.card-row:hover { border-color: var(--g4); box-shadow: 0 0 0 2px var(--g4-glow); }
.card-row .favicon { width: 22px; height: 22px; border-radius: 4px; flex-shrink: 0; }
.card-row-title { font-size: 14px; font-weight: 500; color: var(--text0); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; flex: 1 1 180px; }
.card-row-domain { font-size: 12px; color: var(--text2); white-space: nowrap; flex-shrink: 0; }
.card-row-tags { display: flex; gap: 4px; flex-shrink: 0; }
.card-row-actions { display: none; gap: 4px; flex-shrink: 0; margin-left: auto; }
.card-row:hover .card-row-actions { display: flex; }
.card-row.selected { border-color: var(--g4) !important; background: rgba(29,158,117,.1); }
.card-row.select-mode { cursor: default; }
.card-row.select-mode:hover { border-color: var(--g5); box-shadow: none; }
.card-row.select-mode.selected:hover { border-color: var(--g4) !important; }
.card { background: var(--bg1); border: 0.5px solid var(--border0); border-radius: 12px; padding: var(--card-padding, 14px); cursor: pointer; transition: border-color .15s; display: flex; flex-direction: column; gap: 8px; position: relative; text-decoration: none; }
.card:hover { border-color: var(--g4); box-shadow: 0 0 0 2px var(--g4-glow); }
.card-top { display: flex; align-items: flex-start; gap: 10px; }
.favicon { width: 28px; height: 28px; border-radius: 6px; background: var(--bg3); display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
.favicon img { width: 100%; height: 100%; object-fit: contain; }
.favicon i { font-size: 14px; color: var(--g3); }
.card-title { font-size: 14px; font-weight: 500; color: var(--text0); line-height: 1.3; word-break: break-word; }
.card-url { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-desc { font-size: 13px; color: var(--text1); line-height: 1.5; }
.card-footer { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: auto; padding-top: 4px; }
.tag { font-size: 11px; padding: 3px 8px; border-radius: 20px; background: rgba(15,110,86,.25); color: var(--g2); border: 0.5px solid var(--g5); }
.folder-badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; background: rgba(15,110,86,.25); color: var(--g2); border: 0.5px solid var(--g5); margin-left: auto; display: flex; align-items: center; gap: 4px; }
.card-actions { position: absolute; top: 8px; right: 8px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.icon-btn { width: 26px; height: 26px; border-radius: 8px; border: 0.5px solid var(--g5); background: var(--bg2); color: var(--g3); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 13px; }
.icon-btn:hover { background: var(--g5); color: #fff; }
.empty { text-align: center; padding: 4rem 1rem; color: var(--text2); font-size: 14px; }
.empty i { font-size: 36px; display: block; margin-bottom: 10px; color: var(--g5); }
.folder-section { margin-bottom: 1.5rem; }
.folder-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding: 6px 10px; background: rgba(15,110,86,.15); border-radius: 8px; border: 0.5px solid var(--g5); cursor: pointer; user-select: none; }
.folder-header:hover { background: rgba(15,110,86,.25); }
.folder-chevron { font-size: 14px; color: var(--text2); transition: transform .2s; flex-shrink: 0; }
.folder-chevron.open { transform: rotate(90deg); }
.folder-name { font-size: 13px; font-weight: 500; color: var(--g2); }
.count-pill { font-size: 11px; padding: 1px 7px; border-radius: 20px; background: var(--g5); color: #fff; }
.folder-rename-btn { background: none; border: none; color: var(--text2); font-size: 12px; cursor: pointer; padding: 2px 4px; border-radius: 4px; display: flex; align-items: center; line-height: 1; }
.folder-rename-btn:hover { color: var(--g2); background: rgba(255,255,255,.07); }
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal { background: var(--bg1); border-radius: 12px; border: 1px solid var(--g5); padding: 1.25rem; width: min(460px, 92vw); display: flex; flex-direction: column; gap: 12px; max-height: 90vh; overflow-y: auto; }
.modal-header { display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--g6); padding-bottom: 10px; }
.modal-header i { font-size: 18px; color: var(--g3); }
.modal h3 { font-size: 16px; font-weight: 500; color: var(--g2); }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 11px; color: var(--g3); font-weight: 500; text-transform: uppercase; letter-spacing: .06em; }
.field input[type=text], .field select { width: 100%; }
.field textarea { width: 100%; height: 72px; resize: vertical; padding: 8px 10px; border-radius: 8px; border: 0.5px solid var(--border0); background: var(--bg2); color: var(--text0); font-size: 14px; font-family: inherit; }
.field textarea:focus { outline: none; border-color: var(--g4); }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; padding-top: 4px; border-top: 0.5px solid var(--bg3); margin-top: 4px; }
.import-drop { border: 1.5px dashed var(--g5); border-radius: 12px; padding: 2rem 1rem; text-align: center; cursor: pointer; color: var(--text1); font-size: 14px; transition: border-color .15s, background .15s; }
.import-drop:hover, .import-drop.drag { border-color: var(--g3); background: rgba(15,110,86,.1); }
.import-drop i { font-size: 28px; display: block; margin-bottom: 8px; color: var(--g3); }
.import-preview { max-height: 200px; overflow-y: auto; border: 0.5px solid var(--g5); border-radius: 8px; }
.import-row { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-bottom: 0.5px solid var(--bg3); }
.import-row:last-child { border-bottom: none; }
.import-row:nth-child(odd) { background: rgba(255,255,255,.02); }
.import-row input[type=checkbox] { width: 14px; height: 14px; cursor: pointer; flex-shrink: 0; accent-color: var(--g4); }
.import-row-info { min-width: 0; flex: 1; }
.import-row-title { font-size: 13px; color: var(--text0); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.import-row-url { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.import-row-folder { font-size: 11px; padding: 1px 6px; border-radius: 20px; background: rgba(15,110,86,.25); color: var(--g2); border: 0.5px solid var(--g4); flex-shrink: 0; }
.import-actions { display: flex; gap: 6px; align-items: center; font-size: 12px; color: var(--text1); }
.import-actions a { cursor: pointer; color: var(--g3); text-decoration: none; }
.import-actions a:hover { text-decoration: underline; }
.notice { font-size: 12px; color: var(--g2); padding: 8px 12px; background: rgba(15,110,86,.15); border-radius: 8px; display: flex; align-items: center; gap: 8px; border: 0.5px solid var(--g5); }
.notice i { color: var(--g3); flex-shrink: 0; }
.toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--bg1); border: 1px solid var(--g5); color: var(--g2); padding: 10px 16px; border-radius: 8px; font-size: 14px; display: flex; align-items: center; gap: 8px; z-index: 200; opacity: 0; transition: opacity .2s; pointer-events: none; }
.toast.show { opacity: 1; pointer-events: auto; }
.toast-undo { background: none; border: 1px solid var(--g4); color: var(--g3); border-radius: 6px; padding: 2px 10px; font-size: 13px; cursor: pointer; font-family: inherit; font-weight: 500; }
.toast-undo:hover { background: var(--g5); color: #fff; }
.saving-indicator { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 4px; margin-left: auto; }
.settings-wrap { position: relative; }
.settings-menu { position: absolute; top: calc(100% + 6px); right: 0; background: var(--bg1); border: 1px solid var(--g5); border-radius: 10px; min-width: 160px; z-index: 50; box-shadow: 0 8px 24px rgba(0,0,0,.4); padding: 4px; display: none; flex-direction: column; }
.settings-menu.open { display: flex; }
.settings-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 7px; font-size: 14px; color: var(--text0); cursor: pointer; background: none; border: none; font-family: inherit; width: 100%; text-align: left; }
.settings-item:hover { background: var(--bg3); color: var(--g2); }
.settings-item i { font-size: 15px; color: var(--g3); }
.theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 4px 0; }
.theme-swatch { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; padding: 10px 6px; border-radius: 10px; border: 1.5px solid transparent; transition: border-color .15s, background .15s; }
.theme-swatch:hover { background: var(--bg3); }
.theme-swatch.active { border-color: var(--g4); background: var(--bg3); }
.swatch-dot { width: 36px; height: 36px; border-radius: 50%; }
.swatch-label { font-size: 12px; color: var(--text1); }
.theme-swatch.active .swatch-label { color: var(--g2); }
.drag-handle { width: 26px; height: 26px; border-radius: 8px; border: 0.5px solid var(--g5); background: var(--bg2); color: var(--g3); display: flex; align-items: center; justify-content: center; cursor: grab; font-size: 13px; }
.drag-handle:hover { background: var(--g5); color: #fff; }
.fmgr-row { display: flex; align-items: center; gap: 8px; padding: 7px 16px; border-radius: 8px; }
.fmgr-row:hover { background: var(--bg3); }
.fmgr-subfolder { padding-left: 36px; }
.fmgr-name { flex: 1; font-size: 14px; color: var(--text0); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.fmgr-count { font-size: 12px; color: var(--text2); flex-shrink: 0; }
.fmgr-actions { display: flex; gap: 2px; opacity: 0; flex-shrink: 0; }
.fmgr-row:hover .fmgr-actions { opacity: 1; }
.fmgr-input { flex: 1; background: var(--bg2); border: 1px solid var(--g4); border-radius: 6px; color: var(--text0); padding: 3px 8px; font-size: 14px; font-family: inherit; min-width: 0; }
.drag-handle:active { cursor: grabbing; }
.folder-drag-handle { display: flex; align-items: center; justify-content: center; width: 18px; cursor: grab; color: var(--text2); font-size: 13px; flex-shrink: 0; }
.folder-drag-handle:hover { color: var(--g3); }
.folder-drag-handle:active { cursor: grabbing; }
.card.dragging { opacity: 0.35; }
.card.drag-over { border-color: var(--g3) !important; box-shadow: 0 0 0 2px var(--g4-glow), 0 -3px 0 var(--g3) !important; }
.folder-header.dragging { opacity: 0.5; }
.folder-header.drag-over { background: rgba(15,110,86,.4) !important; border-color: var(--g3) !important; border-style: dashed !important; }
.card.selected { border-color: var(--g4) !important; background: rgba(29,158,117,.1); }
.card-check { position: absolute; top: 8px; left: 8px; width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid var(--g4); background: var(--bg2); display: flex; align-items: center; justify-content: center; z-index: 2; flex-shrink: 0; }
.card-check.checked { background: var(--g4); }
.card-check i { font-size: 11px; color: #fff; display: none; }
.card-check.checked i { display: flex; }
.card.select-mode { cursor: default; }
.card.select-mode:hover { border-color: var(--g5); box-shadow: none; }
.card.select-mode.selected:hover { border-color: var(--g4) !important; }
.bulk-bar { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--bg1); border: 1px solid var(--g5); border-radius: 12px; padding: 10px 16px; display: flex; align-items: center; gap: 10px; z-index: 150; box-shadow: 0 8px 32px rgba(0,0,0,.5); white-space: nowrap; }
.bulk-bar.hidden { display: none; }
.bulk-count { font-size: 14px; font-weight: 500; color: var(--g2); min-width: 72px; }
.bulk-divider { width: 1px; height: 22px; background: var(--border0); flex-shrink: 0; }
.btn.active { background: var(--g5); border-color: var(--g4); color: #fff; }
.star-btn { background: none; border: none; padding: 0; cursor: pointer; font-size: 15px; color: var(--text2); display: flex; align-items: center; flex-shrink: 0; transition: color .15s; }
.star-btn:hover { color: #F5A623; }
.star-btn.active { color: #F5A623; }
.favorites-section { margin-bottom: 1.5rem; }
.favorites-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding: 6px 10px; background: rgba(245,166,35,.08); border-radius: 8px; border: 0.5px solid rgba(245,166,35,.35); cursor: pointer; user-select: none; }
.favorites-header:hover { background: rgba(245,166,35,.15); }
.favorites-title { font-size: 13px; font-weight: 500; color: #F5A623; }
.subfolder-header { display: flex; align-items: center; gap: 6px; padding: 4px 8px; margin: 8px 0 4px 8px; border-left: 2px solid rgba(100,200,100,.4); cursor: pointer; user-select: none; }
.subfolder-header:hover { background: rgba(15,110,86,.12); border-radius: 0 6px 6px 0; }
.subfolder-header.drag-over { background: rgba(15,110,86,.3) !important; border-left-color: var(--g3) !important; border-radius: 0 6px 6px 0; }
.subfolder-title { font-size: 12px; font-weight: 500; color: var(--text2); }
.subfolder-grid { padding-left: 12px; }
.title-wrap { position: relative; display: flex; align-items: center; }
.title-wrap input[type=text] { width: 100%; }
.title-spinner { position: absolute; right: 8px; font-size: 14px; color: var(--text2); pointer-events: none; display: none; animation: spin 1s linear infinite; }
.title-wrap.fetching .title-spinner { display: block; }
.title-wrap.fetching input[type=text] { opacity: 0.55; }
.status-badge { position: absolute; top: 7px; left: 7px; width: 20px; height: 20px; border-radius: 5px; background: rgba(226,75,74,.15); border: 0.5px solid #E24B4A; display: flex; align-items: center; justify-content: center; z-index: 2; pointer-events: none; }
.status-badge i { font-size: 11px; color: #E24B4A; }
.stat-section { display: flex; flex-direction: column; gap: 4px; padding: 4px 0; }
.stat-section + .stat-section { border-top: 0.5px solid var(--bg3); padding-top: 10px; margin-top: 4px; }
.stat-section-title { font-size: 11px; color: var(--g3); font-weight: 500; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
.stat-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat-summary-card { background: var(--bg2); border-radius: 8px; padding: 10px 14px; display: flex; flex-direction: column; gap: 2px; }
.stat-summary-value { font-size: 22px; font-weight: 600; color: var(--g2); }
.stat-summary-label { font-size: 11px; color: var(--text2); }
.stat-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 13px; min-width: 0; }
.stat-row-label { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text0); }
.stat-row-sub { font-size: 11px; color: var(--text2); flex-shrink: 0; }
.stat-bar-track { flex: 1 1 60px; height: 5px; background: var(--bg3); border-radius: 3px; flex-shrink: 0; min-width: 40px; }
.stat-bar-fill { height: 5px; background: var(--g4); border-radius: 3px; }
.stat-toggle { background: none; border: none; color: var(--g3); font-size: 12px; cursor: pointer; font-family: inherit; padding: 0; text-align: left; }
.stat-toggle:hover { color: var(--g2); }
.stat-never-list { display: flex; flex-direction: column; gap: 2px; max-height: 160px; overflow-y: auto; margin-top: 4px; }
.stat-never-item { font-size: 12px; color: var(--text1); padding: 3px 6px; border-radius: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.stat-never-item:hover { background: var(--bg3); color: var(--text0); }
.filter-wrap { position: relative; }
.filter-menu { position: absolute; top: calc(100% + 6px); left: 0; background: var(--bg1); border: 1px solid var(--g5); border-radius: 10px; z-index: 50; box-shadow: 0 8px 24px rgba(0,0,0,.4); padding: 8px; display: none; flex-direction: column; gap: 6px; min-width: 200px; }
.filter-menu.open { display: flex; }
.filter-row { display: flex; flex-direction: column; gap: 4px; }
.filter-row label { font-size: 11px; color: var(--g3); font-weight: 500; text-transform: uppercase; letter-spacing: .06em; padding: 0 2px; }
.filter-row select { width: 100%; }
.filter-badge { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 50%; background: var(--g4); color: #fff; font-size: 10px; font-weight: 600; line-height: 1; }
</style>
</head>
<body>
<div class="container">
  <div class="app-header">
    <i class="ti ti-bookmarks"></i>
    <span>MSP Beacon</span>
    <div class="saving-indicator" id="saveStatus"></div>
  </div>
  <div class="toolbar">
    <div class="search-wrap">
      <i class="ti ti-search search-icon"></i>
      <input type="text" id="search" placeholder="Search links… (press /)" oninput="debouncedRender()">
      <button class="search-clear" id="searchClear" style="display:none" onclick="clearSearch()"><i class="ti ti-x"></i></button>
    </div>
    <div class="filter-wrap">
      <button class="btn" id="filterBtn" onclick="toggleFilter(event)" title="Filter &amp; sort"><i class="ti ti-filter"></i> Filter <span id="filterBadge" style="display:none" class="filter-badge"></span></button>
      <div class="filter-menu" id="filterMenu">
        <div class="filter-row"><label>Folder</label><select id="folderFilter" onchange="render();updateFilterBadge()"><option value="">All folders</option></select></div>
        <div class="filter-row"><label>Tag</label><select id="tagFilter" onchange="render();updateFilterBadge()"><option value="">All tags</option></select></div>
        <div class="filter-row"><label>Sort</label><select id="sortSelect" onchange="onSortChange()">
          <option value="manual">Manual order</option>
          <option value="az">A → Z</option>
          <option value="za">Z → A</option>
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
          <option value="most-visited">Most visited</option>
        </select></div>
      </div>
    </div>
    <button class="btn" id="viewToggleBtn" onclick="toggleView()" title="Toggle view"><i class="ti ti-layout-list" id="viewToggleIcon"></i></button>
    <button class="btn" id="densityBtn" onclick="cycleDensity()" title="Card density"></button>
    <button class="btn" id="selectBtn" onclick="toggleSelectMode()" title="Select"><i class="ti ti-checkbox"></i></button>
    <button class="btn btn-primary" onclick="openModal()"><i class="ti ti-plus"></i> Add link</button>
    <div class="settings-wrap">

<script>
let links = [];
let linkStatus = {};
let editId = null;
let parsedBookmarks = [];
let saveTimer = null;
let collapsedFolders = new Set(JSON.parse(localStorage.getItem('msp-collapsed') || '[]'));
let collapsedSubfolders = JSON.parse(localStorage.getItem('msp-subfolder-collapsed') || '{}');
let folderOrder = JSON.parse(localStorage.getItem('msp-folder-order') || 'null');
let folderColors = JSON.parse(localStorage.getItem('msp-folder-colors') || '{}');
let folderIcons = JSON.parse(localStorage.getItem('msp-folder-icons') || '{}');
let currentTheme = localStorage.getItem('msp-theme') || 'Green';
let dragId = null;
let dragFolder = null;
let dragOverEl = null;
let selectMode = false;
let selectedIds = new Set();
let visibleIds = [];
let favoritesCollapsed = JSON.parse(localStorage.getItem('msp-fav-collapsed') || 'false');
let searchDebounceTimer = null;
function debouncedRender() { clearTimeout(searchDebounceTimer); searchDebounceTimer = setTimeout(render, 150); }
let currentSort = localStorage.getItem('msp-sort') || 'manual';
let currentView = localStorage.getItem('msp-view') || 'grid';
let currentDensity = localStorage.getItem('msp-density') || 'comfortable';
const DENSITY_CYCLE = ['compact', 'comfortable', 'spacious'];
const DENSITY_SETTINGS = {
  compact:     { minWidth: '160px', padding: '8px',  gap: '8px',  icon: 'ti ti-layout-grid',        label: 'Compact'     },
  comfortable: { minWidth: '220px', padding: '14px', gap: '12px', icon: 'ti ti-layout-grid-2',       label: 'Comfortable' },
  spacious:    { minWidth: '300px', padding: '20px', gap: '16px', icon: 'ti ti-layout-grid-3',       label: 'Spacious'    },
};
function applyDensity(d) {
  const s = DENSITY_SETTINGS[d] || DENSITY_SETTINGS.comfortable;
  const r = document.documentElement.style;
  r.setProperty('--card-min-width', s.minWidth);
  r.setProperty('--card-padding', s.padding);
  r.setProperty('--card-gap', s.gap);
  currentDensity = d;
  localStorage.setItem('msp-density', d);
  const btn = document.getElementById('densityBtn');
  if (btn) btn.innerHTML = `<i class="${s.icon}"></i>`;
}
function cycleDensity() {
  const next = DENSITY_CYCLE[(DENSITY_CYCLE.indexOf(currentDensity) + 1) % DENSITY_CYCLE.length];
  applyDensity(next);
}
function toggleView() {
  currentView = currentView === 'grid' ? 'list' : 'grid';
  localStorage.setItem('msp-view', currentView);
  document.getElementById('viewToggleIcon').className = currentView === 'grid' ? 'ti ti-layout-list' : 'ti ti-layout-grid';
  render();
}
function onSortChange() {
  currentSort = document.getElementById('sortSelect').value;
  localStorage.setItem('msp-sort', currentSort);
  updateFilterBadge();
  render();
}
function sortLinks(arr) {
  if (currentSort === 'manual') return arr;
  const copy = arr.slice();
  if (currentSort === 'az') copy.sort((a, b) => (a.title || '').toLowerCase().localeCompare((b.title || '').toLowerCase()));
  else if (currentSort === 'za') copy.sort((a, b) => (b.title || '').toLowerCase().localeCompare((a.title || '').toLowerCase()));
  else if (currentSort === 'newest') copy.sort((a, b) => parseInt(b.id, 36) - parseInt(a.id, 36));
  else if (currentSort === 'oldest') copy.sort((a, b) => parseInt(a.id, 36) - parseInt(b.id, 36));
  else if (currentSort === 'most-visited') copy.sort((a, b) => (b.visits || 0) - (a.visits || 0));
  return copy;
}

function saveConfig() {
  const cfg = { folderColors, folderIcons, folderOrder, theme: currentTheme };
  fetch('/api/config', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(cfg)
  }).catch(e => console.error('Config save failed:', e));
}

function applyServerConfig(cfg) {
  if (!cfg || typeof cfg !== 'object') return;
  if (cfg.folderColors && typeof cfg.folderColors === 'object') {
    folderColors = cfg.folderColors;
    localStorage.setItem('msp-folder-colors', JSON.stringify(folderColors));
  }
  if (cfg.folderIcons && typeof cfg.folderIcons === 'object') {
    folderIcons = cfg.folderIcons;
    localStorage.setItem('msp-folder-icons', JSON.stringify(folderIcons));
  }
  if (Array.isArray(cfg.folderOrder)) {
    folderOrder = cfg.folderOrder;
    localStorage.setItem('msp-folder-order', JSON.stringify(folderOrder));
  }
  if (cfg.theme && THEMES[cfg.theme]) {
    applyTheme(cfg.theme, false);
  }
}

async function loadLinks() {
  try {
    const [linksRes, cfgRes] = await Promise.all([
      fetch('/api/links'),
      fetch('/api/config').catch(() => null)
    ]);
    const data = await linksRes.json();
    links = Array.isArray(data) ? data : [];
    if (cfgRes && cfgRes.ok) applyServerConfig(await cfgRes.json());
    render();
  } catch(e) {
    console.error('Failed to load links', e);
    showToast('Failed to load links from server', true);
  }
}

async function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    const status = document.getElementById('saveStatus');
    status.innerHTML = '<i class="ti ti-loader" style="animation:spin 1s linear infinite"></i> Saving…';
    try {
      const res = await fetch('/api/links', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(links)
      });
      if (!res.ok) throw new Error('Server error ' + res.status);
      status.innerHTML = '<i class="ti ti-circle-check" style="color:var(--g3)"></i> Saved';
      setTimeout(() => status.innerHTML = '', 2000);
    } catch(e) {
      status.innerHTML = '<i class="ti ti-alert-circle" style="color:#E24B4A"></i> Save failed';
    }
  }, 400);
}

let toastTimer = null;
let pendingDelete = null;
let pendingMove = null;

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toastUndo').style.display = 'none';
  document.getElementById('toastIcon').className = isError ? 'ti ti-alert-circle' : 'ti ti-check';
  t.style.borderColor = isError ? '#E24B4A' : '';
  t.style.color = isError ? '#E24B4A' : '';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

function showUndoToast(msg, icon = 'ti-trash') {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toastUndo').style.display = '';
  document.getElementById('toastIcon').className = `ti ${icon}`;
  t.style.borderColor = '';
  t.style.color = '';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 5500);
}

function undoAction() {
  if (pendingDelete) undoDelete();
  else if (pendingMove) undoMove();
}

function undoDelete() {
  if (!pendingDelete) return;
  clearTimeout(pendingDelete.timer);
  links = pendingDelete.saved;
  pendingDelete = null;
  render();
  showToast('Restored');
}

function undoMove() {
  if (!pendingMove) return;
  clearTimeout(pendingMove.timer);
  links = pendingMove.saved;
  pendingMove = null;
  save(); render();
  showToast('Move undone');
}

function commitPendingMove() {
  if (!pendingMove) return;
  clearTimeout(pendingMove.timer);
  pendingMove = null;
  save();
}

function getFavicon(u) { try { return 'https://www.google.com/s2/favicons?domain=' + new URL(u).hostname + '&sz=64'; } catch { return null; } }
function getDomain(u) { try { return new URL(u).hostname.replace('www.', ''); } catch { return u; } }
function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function hexToRgb(hex) {
  if (!hex || !/^#[0-9A-Fa-f]{6}$/.test(hex)) return '29,158,117';
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}
function getFolderColor(f) { return folderColors[f] || '#1D9E75'; }
function getFolderIcon(f) { return folderIcons[f] || 'ti-folder'; }
function allFolders() { return [...new Set(links.map(l => l.folder).filter(Boolean))].sort(); }
function getOrderedFolders(names) {
  if (!folderOrder) return names.slice().sort();
  const known = new Set(folderOrder);
  const fresh = names.filter(f => !known.has(f)).sort();
  return [...folderOrder.filter(f => names.includes(f)), ...fresh];
}
function allTags() { return [...new Set(links.flatMap(l => l.tags || []))].sort(); }

function subfoldersByFolder(folderName) {
  return [...new Set(links.filter(l => l.folder === folderName && l.subfolder).map(l => l.subfolder))].sort();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const clearBtn = document.getElementById('searchClear');
  if (clearBtn) clearBtn.style.display = q ? '' : 'none';
  const ff = document.getElementById('folderFilter').value;
  const tf = document.getElementById('tagFilter').value;
  const fs = document.getElementById('folderFilter'), ts = document.getElementById('tagFilter');
  fs.innerHTML = '<option value="">All folders</option>' + allFolders().map(f => `<option value="${esc(f)}"${f===ff?' selected':''}>${esc(f)}</option>`).join('');
  ts.innerHTML = '<option value="">All tags</option>' + allTags().map(t => `<option value="${esc(t)}"${t===tf?' selected':''}>${esc(t)}</option>`).join('');
  const sortEl = document.getElementById('sortSelect');
  if (sortEl) sortEl.value = currentSort;
  updateFilterBadge();
  let fil = links.filter(l => {
    if (ff && l.folder !== ff) return false;
    if (tf && !(l.tags || []).some(t => t.toLowerCase() === tf.toLowerCase())) return false;
    if (q && !((l.title+l.url+l.desc+(l.folder||'')+(l.subfolder||'')+(l.tags||[]).join(' ')).toLowerCase().includes(q))) return false;
    return true;
  });
  fil = sortLinks(fil);
  visibleIds = fil.map(l => l.id);
  const c = document.getElementById('content');
  if (!fil.length) {
    c.innerHTML = `<div class="empty"><i class="ti ti-bookmarks"></i>${links.length ? 'No results match your filters.' : 'No links yet — click <strong>Add link</strong> or <strong>Import</strong> to get started.'}</div>`;
    return;
  }
  const cardFn = currentView === 'list' ? cardListHtml : cardHtml;
  const wrap = items => currentView === 'list' ? `<div class="link-list">${items.map(cardFn).join('')}</div>` : `<div class="grid">${items.map(cardFn).join('')}</div>`;
  if (ff || q || tf) { c.innerHTML = wrap(fil); return; }
  const byF = {}, noF = [];
  fil.forEach(l => { l.folder ? (byF[l.folder] = byF[l.folder] || [], byF[l.folder].push(l)) : noF.push(l); });
  let html = '';
  const favs = fil.filter(l => l.favorite);
  if (favs.length) {
    html += `<div class="favorites-section"><div class="favorites-header" onclick="toggleFavorites()"><i class="ti ti-chevron-right folder-chevron${favoritesCollapsed ? '' : ' open'}"></i><i class="ti ti-star-filled" style="font-size:15px;color:#F5A623"></i><span class="favorites-title">Favorites</span><span class="count-pill" style="background:rgba(245,166,35,.3);color:#F5A623">${favs.length}</span></div>${favoritesCollapsed ? '' : wrap(favs)}</div>`;
  }
  if (noF.length) html += wrap(noF);
  getOrderedFolders(Object.keys(byF)).forEach(f => {
    const collapsed = collapsedFolders.has(f);
    let folderContent = '';
    if (!collapsed) {
      folderContent = renderFolderContents(f, byF[f]);
    }
    const fc = getFolderColor(f);
    const fcRgb = hexToRgb(fc);

function renderFolderContents(folderName, folderLinks) {
  const rootLinks = folderLinks.filter(l => !l.subfolder);
  const bySubfolder = {};
  folderLinks.filter(l => l.subfolder).forEach(l => {
    bySubfolder[l.subfolder] = bySubfolder[l.subfolder] || [];
    bySubfolder[l.subfolder].push(l);
  });

  const cardFn = currentView === 'list' ? cardListHtml : cardHtml;
  const wrap = items => currentView === 'list' ? `<div class="link-list">${items.map(cardFn).join('')}</div>` : `<div class="grid">${items.map(cardFn).join('')}</div>`;

  let html = '';
  if (rootLinks.length) {
    html += wrap(rootLinks);
  }

  const fc = getFolderColor(folderName);
  const fcRgb = hexToRgb(fc);
  Object.keys(bySubfolder).sort().forEach(sf => {
    const key = JSON.stringify([folderName, sf]);
    const sfCollapsed = !!collapsedSubfolders[key];
    const sfLinks = bySubfolder[sf];
    html += `<div class="subfolder-header" onclick="toggleSubfolder(this.dataset.folder,this.dataset.subfolder)" data-folder="${esc(folderName)}" data-subfolder="${esc(sf)}" style="border-left-color:rgba(${fcRgb},.5)">`;
    html += `<i class="ti ti-chevron-right folder-chevron${sfCollapsed ? '' : ' open'}" style="font-size:12px;color:${fc}"></i>`;
    html += `<i class="ti ti-folder" style="font-size:12px;color:${fc};opacity:.7"></i>`;
    html += `<span class="subfolder-title">${esc(sf)}</span>`;
    html += `<span class="count-pill" style="font-size:10px;padding:1px 5px;background:rgba(${fcRgb},.5)">${sfLinks.length}</span>`;

    html += `</div>`;
    if (!sfCollapsed) {

  });

  return html;
}

function saveLink() {
  const url = document.getElementById('mUrl').value.trim();
  const title = document.getElementById('mTitle').value.trim();
  if (!url || !title) { alert('URL and title are required.'); return; }
  const nf = document.getElementById('mNewFolder').value.trim();
  const folder = nf || document.getElementById('mFolder').value || '';
  const subfolder = document.getElementById('mSubfolder').value.trim() || null;
  const tags = document.getElementById('mTags').value.split(',').map(t => t.trim()).filter(Boolean);
  const desc = document.getElementById('mDesc').value.trim();
  if (!editId) {
    const dup = links.find(l => l.url.trim().toLowerCase() === url.toLowerCase());
    if (dup) {
      const w = document.getElementById('dupWarning');
      document.getElementById('dupWarningMsg').innerHTML = `A link with this URL already exists — <strong>${esc(dup.title)}</strong>`;
      w.style.display = 'flex';
      return;
    }
  }
  if (editId) {
    const i = links.findIndex(l => l.id === editId);
    if (i > -1) links[i] = { ...links[i], url, title, desc, folder, subfolder, tags };
  } else {
    links.unshift({ id: Date.now().toString(36) + Math.random().toString(36).slice(2), url, title, desc, folder, subfolder, tags });
  }
  const wasEditing = !!editId;
  save(); closeModal(); render();
  showToast(wasEditing ? 'Link updated' : 'Link saved');
}

function handleFile(file) { if (!file) return; const r = new FileReader(); r.onload = e => parseBookmarks(e.target.result); r.readAsText(file); }
function parseBookmarks(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const res = [];
  function walk(dl, path) {
    for (const ch of (dl ? dl.children : [])) {
      if (ch.tagName !== 'DT') continue;
      const a = ch.querySelector(':scope > A'), h3 = ch.querySelector(':scope > H3'), dl2 = ch.querySelector(':scope > DL');
      if (a) { const u = a.getAttribute('HREF') || '', t = a.textContent.trim() || getDomain(u); if (u && !u.startsWith('javascript:') && !u.startsWith('place:') && !u.startsWith('data:')) res.push({ url: u, title: t, folder: path }); }
      else if (h3 && dl2) { const n = h3.textContent.trim(); const skip = ['Bookmarks bar','Bookmarks Bar','Bookmarks toolbar','Bookmarks Toolbar','Other bookmarks','Other Bookmarks','Mobile bookmarks','Mobile Bookmarks']; walk(dl2, skip.includes(n) ? path : (path ? path + ' / ' + n : n)); }
    }
  }
  walk(doc.querySelector('DL'), '');
  if (!res.length) { alert('No bookmarks found. Make sure this is a valid browser bookmark export.'); return; }
  parsedBookmarks = res; showPreview();
}
function showPreview() {
  document.getElementById('dropZone').style.display = 'none';
  document.getElementById('importPreviewWrap').style.display = 'flex';
  document.getElementById('importBtn').style.display = 'flex';
  document.getElementById('importCount').textContent = parsedBookmarks.length + ' bookmarks found';
  document.getElementById('importPreview').innerHTML = parsedBookmarks.map((b, i) => `
    <div class="import-row"><input type="checkbox" id="imp_${i}" checked>
      <div class="import-row-info"><div class="import-row-title">${esc(b.title)}</div><div class="import-row-url">${esc(b.url)}</div></div>
      ${b.folder ? `<span class="import-row-folder">${esc(b.folder)}</span>` : ''}
    </div>`).join('');
}
function toggleAll(v) { parsedBookmarks.forEach((_, i) => { const c = document.getElementById('imp_' + i); if (c) c.checked = v; }); }
function doImport() {
  const of2 = document.getElementById('impNewFolder').value.trim() || document.getElementById('impFolder').value || '';
  const et = document.getElementById('impTags').value.split(',').map(t => t.trim()).filter(Boolean);
  const eu = new Set(links.map(l => l.url.toLowerCase()));
  let added = 0, skipped = 0;
  parsedBookmarks.forEach((b, i) => {
    const cb = document.getElementById('imp_' + i);
    if (!cb || !cb.checked) return;
    if (eu.has(b.url.toLowerCase())) { skipped++; return; }
    links.unshift({ id: Date.now().toString(36) + Math.random().toString(36).slice(2) + i, url: b.url, title: b.title, desc: '', folder: of2 || b.folder || '', tags: [...et] });
    eu.add(b.url.toLowerCase()); added++;
  });
  save(); closeImport(); render();
  showToast(`${added} links imported${skipped ? ', ' + skipped + ' duplicates skipped' : ''}`);
}

function toggleFolder(name) {
  const contentEl = Array.from(document.querySelectorAll('.folder-content')).find(el => el.dataset.folder === name);
  const isCollapsed = collapsedFolders.has(name);

  if (!isCollapsed && contentEl) {
    if (contentEl.dataset.animating) return;
    contentEl.dataset.animating = '1';
    const chevron = Array.from(document.querySelectorAll('.folder-header')).find(el => el.dataset.folder === name)?.querySelector('.folder-chevron');
    if (chevron) chevron.classList.remove('open');
    contentEl.style.overflow = 'hidden';
    contentEl.style.maxHeight = contentEl.scrollHeight + 'px';
    contentEl.style.opacity = '1';
    requestAnimationFrame(() => {
      contentEl.style.transition = 'max-height 0.25s ease, opacity 0.2s ease';
      contentEl.style.maxHeight = '0';
      contentEl.style.opacity = '0';
    });
    setTimeout(() => {
      delete contentEl.dataset.animating;
      collapsedFolders.add(name);
      localStorage.setItem('msp-collapsed', JSON.stringify([...collapsedFolders]));
      render();
    }, 260);
    return;
  }

  if (isCollapsed) collapsedFolders.delete(name);
  else collapsedFolders.add(name);
  localStorage.setItem('msp-collapsed', JSON.stringify([...collapsedFolders]));
  render();

  if (isCollapsed) {
    const newEl = Array.from(document.querySelectorAll('.folder-content')).find(el => el.dataset.folder === name);
    if (newEl && !newEl.dataset.animating) {
      newEl.dataset.animating = '1';
      const height = newEl.scrollHeight;
      newEl.style.overflow = 'hidden';
      newEl.style.maxHeight = '0';
      newEl.style.opacity = '0';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        newEl.style.transition = 'max-height 0.25s ease, opacity 0.2s ease';
        newEl.style.maxHeight = height + 'px';
        newEl.style.opacity = '1';
        setTimeout(() => {
          delete newEl.dataset.animating;
          newEl.style.maxHeight = '';
          newEl.style.overflow = '';
          newEl.style.transition = '';
          newEl.style.opacity = '';
        }, 260);
      }));
    }
  }
}

function renameFolder(oldName, newName) {
  newName = newName.trim();
  if (!newName || newName === oldName) return;
  // Update all links
  links.forEach(l => { if (l.folder === oldName) l.folder = newName; });
  // Update folderColors
  if (folderColors[oldName]) {
    folderColors[newName] = folderColors[oldName];
    delete folderColors[oldName];
    localStorage.setItem('msp-folder-colors', JSON.stringify(folderColors));
  }
  // Update folderOrder
  if (folderOrder) {
    const idx = folderOrder.indexOf(oldName);
    if (idx > -1) folderOrder[idx] = newName;
    localStorage.setItem('msp-folder-order', JSON.stringify(folderOrder));
  }
  // Update collapsedFolders
  if (collapsedFolders.has(oldName)) {
    collapsedFolders.delete(oldName);
    collapsedFolders.add(newName);
    localStorage.setItem('msp-collapsed', JSON.stringify([...collapsedFolders]));
  }
  // Update folderIcons
  if (folderIcons[oldName]) {
    folderIcons[newName] = folderIcons[oldName];
    delete folderIcons[oldName];
    localStorage.setItem('msp-folder-icons', JSON.stringify(folderIcons));
  }
  save();
  saveConfig();
}
function deleteFolder(name) {
  const count = links.filter(l => l.folder === name).length;
  if (!confirm(`Delete folder "${name}"? ${count} link${count !== 1 ? 's' : ''} will be moved to no folder.`)) return;
  links.forEach(l => { if (l.folder === name) { l.folder = ''; l.subfolder = null; } });
  delete folderColors[name];
  localStorage.setItem('msp-folder-colors', JSON.stringify(folderColors));
  delete folderIcons[name];
  localStorage.setItem('msp-folder-icons', JSON.stringify(folderIcons));
  if (folderOrder) {
    folderOrder = folderOrder.filter(f => f !== name);
    localStorage.setItem('msp-folder-order', JSON.stringify(folderOrder));
  }
  collapsedFolders.delete(name);
  localStorage.setItem('msp-collapsed', JSON.stringify([...collapsedFolders]));
  Object.keys(collapsedSubfolders).forEach(key => {
    try { if (JSON.parse(key)[0] === name) delete collapsedSubfolders[key]; } catch {}
  });
  localStorage.setItem('msp-subfolder-collapsed', JSON.stringify(collapsedSubfolders));
  save(); render(); saveConfig();
  showToast(`Folder "${name}" deleted`);
}
function deleteSubfolder(folderName, subName) {
  const count = links.filter(l => l.folder === folderName && l.subfolder === subName).length;
  if (!confirm(`Delete sub-folder "${subName}"? ${count} link${count !== 1 ? 's' : ''} will be moved to folder "${folderName}".`)) return;
  links.forEach(l => { if (l.folder === folderName && l.subfolder === subName) l.subfolder = null; });
  const key = JSON.stringify([folderName, subName]);
  delete collapsedSubfolders[key];
  localStorage.setItem('msp-subfolder-collapsed', JSON.stringify(collapsedSubfolders));
  save(); render(); saveConfig();
  showToast(`Sub-folder "${subName}" deleted`);
}

function setupDragListeners() {
  const content = document.getElementById('content');

  content.addEventListener('dragstart', e => {
    const handle = e.target.closest('.drag-handle');
    const folderHandle = e.target.closest('.folder-drag-handle');
    if (handle) {
      const card = handle.closest('.card[data-id]');
      if (!card) return;
      dragId = card.dataset.id;
      dragFolder = null;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', dragId);
      e.dataTransfer.setDragImage(card, 20, 20);
      setTimeout(() => card.classList.add('dragging'), 0);
    } else if (folderHandle) {
      const header = folderHandle.closest('.folder-header[data-folder]');
      if (!header) return;
      dragFolder = header.dataset.folder;
      dragId = null;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', dragFolder);
      e.dataTransfer.setDragImage(header, 20, 10);
      setTimeout(() => header.classList.add('dragging'), 0);
    }
  });

  content.addEventListener('dragover', e => {
    if (!dragId && !dragFolder) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    let newTarget = null;
    if (dragId) {
      const card = e.target.closest('.card[data-id], .card-row[data-id]');
      if (card && card.dataset.id !== dragId) {
        newTarget = card;
      } else if (!card) {
        const sfHeader = e.target.closest('.subfolder-header[data-subfolder]');
        if (sfHeader) {
          newTarget = sfHeader;
        } else {
          const header = e.target.closest('.folder-header[data-folder]');
          if (header) newTarget = header;
        }
      }
    } else if (dragFolder) {
      const header = e.target.closest('.folder-header[data-folder]');
      if (header && header.dataset.folder !== dragFolder) newTarget = header;
    }
    if (newTarget !== dragOverEl) {
      if (dragOverEl) dragOverEl.classList.remove('drag-over');
      dragOverEl = newTarget;
      if (dragOverEl) dragOverEl.classList.add('drag-over');
    }
  });

  content.addEventListener('dragleave', e => {
    if (!content.contains(e.relatedTarget)) {
      if (dragOverEl) dragOverEl.classList.remove('drag-over');
      dragOverEl = null;
    }
  });

  content.addEventListener('drop', e => {
    e.preventDefault();
    if (dragOverEl) dragOverEl.classList.remove('drag-over');
    document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
    if (dragId) {
      const card = e.target.closest('.card[data-id], .card-row[data-id]');
      const sfHeader = e.target.closest('.subfolder-header[data-subfolder]');
      const header = !sfHeader ? e.target.closest('.folder-header[data-folder]') : null;
      if (card && card.dataset.id !== dragId) {
        if (pendingDelete) { clearTimeout(pendingDelete.timer); save(); pendingDelete = null; }
        commitPendingMove();
        const saved = links.slice();
        const srcIdx = links.findIndex(l => l.id === dragId);
        const tgtLink = links.find(l => l.id === card.dataset.id);
        const [moved] = links.splice(srcIdx, 1);
        const destFolder = tgtLink.folder || '';
        moved.folder = destFolder;
        moved.subfolder = tgtLink.subfolder || null;
        const newTgt = links.findIndex(l => l.id === card.dataset.id);
        links.splice(newTgt, 0, moved);
        render();
        pendingMove = { saved, timer: setTimeout(() => { pendingMove = null; save(); }, 5000) };
        showUndoToast(`Moved to "${destFolder || 'no folder'}" — Undo?`, 'ti-arrows-move');
      } else if (sfHeader) {
        const srcIdx = links.findIndex(l => l.id === dragId);
        if (srcIdx > -1) {
          if (pendingDelete) { clearTimeout(pendingDelete.timer); save(); pendingDelete = null; }
          commitPendingMove();
          const saved = links.slice();
          links[srcIdx].folder = sfHeader.dataset.folder;
          links[srcIdx].subfolder = sfHeader.dataset.subfolder;
          render();
          pendingMove = { saved, timer: setTimeout(() => { pendingMove = null; save(); }, 5000) };
          showUndoToast(`Moved to ${sfHeader.dataset.folder} / ${sfHeader.dataset.subfolder} — Undo?`, 'ti-arrows-move');
        }
      } else if (header) {
        const srcIdx = links.findIndex(l => l.id === dragId);
        if (srcIdx > -1) {
          if (pendingDelete) { clearTimeout(pendingDelete.timer); save(); pendingDelete = null; }
          commitPendingMove();
          const saved = links.slice();
          links[srcIdx].folder = header.dataset.folder;
          links[srcIdx].subfolder = null;
          render();
          pendingMove = { saved, timer: setTimeout(() => { pendingMove = null; save(); }, 5000) };
          showUndoToast(`Moved to "${header.dataset.folder}" — Undo?`, 'ti-arrows-move');
        }
      }
    } else if (dragFolder) {
      const header = e.target.closest('.folder-header[data-folder]');
      if (header && header.dataset.folder !== dragFolder) {
        const names = getOrderedFolders(allFolders());
        const si = names.indexOf(dragFolder), ti = names.indexOf(header.dataset.folder);
        if (si > -1 && ti > -1) {
          names.splice(si, 1);
          names.splice(ti, 0, dragFolder);
          folderOrder = names;
          localStorage.setItem('msp-folder-order', JSON.stringify(folderOrder));
          render();
          saveConfig();
        }
      }
    }
    dragId = null; dragFolder = null; dragOverEl = null;
  });

  content.addEventListener('dragend', () => {
    dragId = null; dragFolder = null;
    if (dragOverEl) dragOverEl.classList.remove('drag-over');
    dragOverEl = null;
    document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
  });
}

function exportLinks() {
  const rows = links.map(l => {
    const folder = l.folder || '';
    return { url: l.url, title: l.title, folder };
  });
  const folders = [...new Set(rows.map(r => r.folder))];
  let inner = '';
  folders.forEach(f => {
    const items = rows.filter(r => r.folder === f);
    const xmlEsc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const itemsHtml = items.map(r => `        <DT><A HREF="${xmlEsc(r.url)}">${xmlEsc(r.title)}</A>`).join('\n');
    if (f) {
      inner += `    <DT><H3>${xmlEsc(f)}</H3>\n    <DL><p>\n${itemsHtml}\n    </DL><p>\n`;
    } else {
      inner += itemsHtml + '\n';
    }
  });
  const html = `<!DOCTYPE NETSCAPE-Bookmark-file-1>\n<META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=UTF-8">\n<TITLE>Bookmarks</TITLE>\n<H1>Bookmarks</H1>\n<DL><p>\n${inner}</DL>`;
  const blob = new Blob([html], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'msp-beacon-bookmarks.html';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('Bookmarks exported');
}

function timeAgo(ts) {
  if (!ts) return '';
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  if (s < 2592000) return Math.floor(s / 86400) + 'd ago';
  return Math.floor(s / 2592000) + 'mo ago';
}

async function handleRestoreFile(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';
  let text, backup;
  try { text = await file.text(); backup = JSON.parse(text); } catch { showToast('Invalid backup file'); return; }
  if (!backup.links || !Array.isArray(backup.links)) { showToast('Invalid backup file'); return; }
  const date = backup.exportedAt ? new Date(backup.exportedAt).toLocaleString() : 'unknown date';
  if (!confirm(`Restore ${backup.links.length} links from backup dated ${date}?\n\nThis will replace all current links and settings.`)) return;
  try {
    const res = await fetch('/api/restore', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: text
    });
    if (res.ok) { showToast('Restore successful — reloading…'); setTimeout(() => location.reload(), 1500); }
    else showToast('Restore failed');
  } catch { showToast('Restore failed'); }
}

  if (!folders.length) {
    content.innerHTML = '<p style="text-align:center;color:var(--text2);padding:24px 16px">No folders yet.</p>';
    return;
  }
  let html = '';
  folders.forEach(f => {
    const color = getFolderColor(f);
    const icon = getFolderIcon(f);
    const count = links.filter(l => l.folder === f).length;
    const subs = subfoldersByFolder(f);
    html += `<div class="fmgr-row">
      <i class="ti ${esc(icon)}" style="color:${esc(color)};font-size:15px;flex-shrink:0"></i>
      <span class="fmgr-name">${esc(f)}</span>
      <span class="fmgr-count">${count}</span>
      <div class="fmgr-actions">
        <button class="icon-btn" title="Rename" data-type="folder" data-folder="${esc(f)}" data-subfolder=""><i class="ti ti-pencil"></i></button>
        <button class="icon-btn" style="color:#E24B4A" title="Delete" data-type="folder" data-folder="${esc(f)}" data-subfolder=""><i class="ti ti-trash"></i></button>
      </div>
    </div>`;
    subs.forEach(sf => {
      const sfCount = links.filter(l => l.folder === f && l.subfolder === sf).length;
      html += `<div class="fmgr-row fmgr-subfolder">
        <i class="ti ti-corner-down-right" style="color:var(--text2);font-size:13px;flex-shrink:0"></i>
        <span class="fmgr-name">${esc(sf)}</span>
        <span class="fmgr-count">${sfCount}</span>
        <div class="fmgr-actions">
          <button class="icon-btn" title="Rename" data-type="subfolder" data-folder="${esc(f)}" data-subfolder="${esc(sf)}"><i class="ti ti-pencil"></i></button>
          <button class="icon-btn" style="color:#E24B4A" title="Delete" data-type="subfolder" data-folder="${esc(f)}" data-subfolder="${esc(sf)}"><i class="ti ti-trash"></i></button>
        </div>
      </div>`;
    });
  });
  content.innerHTML = html;
  content.querySelectorAll('[title="Rename"]').forEach(btn => btn.addEventListener('click', () => fmgrStartRename(btn)));
  content.querySelectorAll('[title="Delete"]').forEach(btn => btn.addEventListener('click', () => fmgrDeleteRow(btn)));
}
function fmgrStartRename(btn) {
  const type = btn.dataset.type;
  const folder = btn.dataset.folder;
  const subfolder = btn.dataset.subfolder;
  const oldName = type === 'folder' ? folder : subfolder;
  const row = btn.closest('.fmgr-row');
  const nameSpan = row.querySelector('.fmgr-name');
  const input = document.createElement('input');
  input.className = 'fmgr-input';
  input.value = oldName;
  nameSpan.replaceWith(input);
  input.focus(); input.select();
  let committed = false;
  function commit() {
    if (committed) return; committed = true;
    const newName = input.value.trim();
    if (newName && newName !== oldName) {
      if (type === 'folder') renameFolder(folder, newName);
      else renameSubfolder(folder, subfolder, newName);
      render();
    }
    renderFolderManager();
  }
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { committed = true; renderFolderManager(); }
  });
}
function fmgrDeleteRow(btn) {
  const type = btn.dataset.type;
  const folder = btn.dataset.folder;
  const subfolder = btn.dataset.subfolder;
  if (type === 'folder') deleteFolder(folder);
  else deleteSubfolder(folder, subfolder);
  renderFolderManager();
}
function renameTag(oldName, newName) {
  newName = newName.trim();
  if (!newName || newName === oldName) return;
  links.forEach(l => {
    if ((l.tags || []).includes(oldName)) {
      l.tags = l.tags.map(t => t === oldName ? newName : t);
    }
  });
  save(); render();
}
function deleteTag(name) {
  const count = links.filter(l => (l.tags || []).includes(name)).length;
  if (!confirm(`Delete tag "${name}"? It will be removed from ${count} link${count !== 1 ? 's' : ''}.`)) return;
  links.forEach(l => { if (l.tags) l.tags = l.tags.filter(t => t !== name); });
  save(); render();
  showToast(`Tag "${name}" deleted`);
}
function openTagManager() {
  renderTagManager();
  document.getElementById('tagMgrBg').style.display = 'flex';
}
function closeTagManager() { document.getElementById('tagMgrBg').style.display = 'none'; }
function renderTagManager() {
  const tags = allTags();
  const content = document.getElementById('tagMgrContent');
  if (!tags.length) {
    content.innerHTML = '<p style="text-align:center;color:var(--text2);padding:24px 16px">No tags yet.</p>';
    return;
  }
  content.innerHTML = tags.map(t => {
    const count = links.filter(l => (l.tags || []).includes(t)).length;
    return `<div class="fmgr-row">
      <i class="ti ti-tag" style="color:var(--g3);font-size:14px;flex-shrink:0"></i>
      <span class="fmgr-name">${esc(t)}</span>
      <span class="fmgr-count">${count}</span>
      <div class="fmgr-actions">
        <button class="icon-btn" title="Rename" data-tag="${esc(t)}"><i class="ti ti-pencil"></i></button>
        <button class="icon-btn" style="color:#E24B4A" title="Delete" data-tag="${esc(t)}"><i class="ti ti-trash"></i></button>
      </div>
    </div>`;
  }).join('');
  content.querySelectorAll('[title="Rename"]').forEach(btn => btn.addEventListener('click', () => tmgrStartRename(btn)));
  content.querySelectorAll('[title="Delete"]').forEach(btn => btn.addEventListener('click', () => {
    deleteTag(btn.dataset.tag);
    renderTagManager();
  }));
}
function tmgrStartRename(btn) {
  const oldName = btn.dataset.tag;
  const row = btn.closest('.fmgr-row');
  const nameSpan = row.querySelector('.fmgr-name');
  const input = document.createElement('input');
  input.className = 'fmgr-input';
  input.value = oldName;
  nameSpan.replaceWith(input);
  input.focus(); input.select();
  let committed = false;
  function commit() {
    if (committed) return; committed = true;
    const newName = input.value.trim();
    if (newName && newName !== oldName) renameTag(oldName, newName);
    renderTagManager();
  }
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { committed = true; renderTagManager(); }
  });
}
function resetStats() {
  if (!confirm('Reset all visit counts to zero?')) return;
  links.forEach(l => { l.visits = 0; });
  save();
  renderStats();
  showToast('Stats reset');
}
function renderStats() {
  const totalLinks = links.length;
  const totalVisits = links.reduce((s, l) => s + (l.visits || 0), 0);
  const sorted = links.slice().sort((a, b) => (b.visits || 0) - (a.visits || 0));
  const topMax = sorted[0] ? (sorted[0].visits || 0) : 1;
  const top10 = sorted.filter(l => (l.visits || 0) > 0).slice(0, 10);
  const never = links.filter(l => !(l.visits || 0));

  const folders = allFolders();
  const noFolderCount = links.filter(l => !l.folder).length;
  const folderRows = folders.map(f => {
    const count = links.filter(l => l.folder === f).length;
    return `<div class="stat-row">
      <i class="ti ti-folder" style="font-size:13px;color:var(--g4);flex-shrink:0"></i>
      <span class="stat-row-label">${esc(f)}</span>
      <span class="stat-row-sub">${count} link${count !== 1 ? 's' : ''}</span>
    </div>`;
  }).join('');
  const noFolderRow = noFolderCount > 0 ? `<div class="stat-row">
    <i class="ti ti-minus" style="font-size:13px;color:var(--text2);flex-shrink:0"></i>
    <span class="stat-row-label" style="color:var(--text2)">No folder</span>
    <span class="stat-row-sub">${noFolderCount} link${noFolderCount !== 1 ? 's' : ''}</span>
  </div>` : '';

  const topRows = top10.length ? top10.map(l => `
    <div class="stat-row">
      <span class="stat-row-label">${esc(l.title)}</span>
      <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${Math.round(((l.visits||0)/topMax)*100)}%"></div></div>
      <span class="stat-row-sub" style="min-width:44px;text-align:right">${l.visits} visit${l.visits !== 1 ? 's' : ''}</span>
    </div>`).join('') : `<div style="font-size:13px;color:var(--text2)">No links visited yet.</div>`;

  const neverList = statsNeverExpanded ? `<div class="stat-never-list">${never.map(l => `<div class="stat-never-item">${esc(l.title)}</div>`).join('')}</div>` : '';

  document.getElementById('statsContent').innerHTML = `
    <div class="stat-section">
      <div class="stat-section-title">Summary</div>
      <div class="stat-summary">
        <div class="stat-summary-card"><div class="stat-summary-value">${totalLinks}</div><div class="stat-summary-label">Total links</div></div>
        <div class="stat-summary-card"><div class="stat-summary-value">${totalVisits}</div><div class="stat-summary-label">Total visits</div></div>
      </div>
    </div>
    <div class="stat-section">
      <div class="stat-section-title">By Folder</div>
      ${folderRows}${noFolderRow}
    </div>
    <div class="stat-section">
      <div class="stat-section-title">Top 10 Most Visited</div>
      ${topRows}
    </div>
    <div class="stat-section">
      <div class="stat-section-title" style="display:flex;align-items:center;justify-content:space-between">
        <span>Never Visited</span>
        ${never.length ? `<button class="stat-toggle" onclick="statsNeverExpanded=!statsNeverExpanded;renderStats()">${statsNeverExpanded ? 'Hide' : `Show ${never.length}`}</button>` : ''}
      </div>
      ${never.length === 0 ? `<div style="font-size:13px;color:var(--text2)">All links have been visited!</div>` : `<div style="font-size:13px;color:var(--text2)">${never.length} link${never.length !== 1 ? 's' : ''} never opened</div>`}
      ${neverList}
    </div>`;
}

const COLOR_PRESETS = ['#1D9E75','#2563EB','#7C3AED','#0D9488','#D97706','#DC2626','#DB2777','#0891B2','#65A30D','#6B7280'];
let colorPickerFolder = null;

function openFolderColorPicker(folderName, anchorEl) {
  colorPickerFolder = folderName;
  const picker = document.getElementById('folderColorPicker');
  const current = getFolderColor(folderName);
  picker.innerHTML = COLOR_PRESETS.map(c =>
    `<div onclick="selectFolderColor('${c}')" style="width:24px;height:24px;border-radius:50%;background:${c};cursor:pointer;outline:${c===current?'2px solid #fff':'none'};outline-offset:2px"></div>`
  ).join('');
  picker.style.display = 'flex';
  const rect = anchorEl.getBoundingClientRect();
  picker.style.top = (rect.bottom + 6) + 'px';
  picker.style.left = Math.min(rect.right - 168, window.innerWidth - 180) + 'px';
}

function selectFolderColor(color) {
  if (!colorPickerFolder) return;
  folderColors[colorPickerFolder] = color;
  localStorage.setItem('msp-folder-colors', JSON.stringify(folderColors));
  closeFolderColorPicker();
  render();
  saveConfig();
}

function closeFolderColorPicker() {
  const picker = document.getElementById('folderColorPicker');
  if (picker) picker.style.display = 'none';
  colorPickerFolder = null;
}

const ICON_PRESETS = [
  'ti-folder','ti-server','ti-cloud','ti-code','ti-database','ti-shield',
  'ti-home','ti-tool','ti-star','ti-bookmark','ti-heart','ti-bolt',
  'ti-world','ti-mail','ti-chart-bar','ti-settings','ti-users','ti-file',
  'ti-camera','ti-music','ti-gamepad','ti-school','ti-briefcase','ti-rocket'
];
let iconPickerFolder = null;
function openFolderIconPicker(folderName, anchorEl) {
  iconPickerFolder = folderName;
  closeFolderColorPicker();
  const picker = document.getElementById('folderIconPicker');
  const current = getFolderIcon(folderName);
  const fc = getFolderColor(folderName);
  picker.innerHTML = ICON_PRESETS.map(ic =>
    `<div onclick="selectFolderIcon('${ic}')" title="${ic.replace('ti-','')}" style="width:32px;height:32px;border-radius:6px;background:${ic===current?'var(--g5)':'var(--bg3)'};display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid ${ic===current?fc:'transparent'}"><i class="ti ${ic}" style="font-size:16px;color:${ic===current?'#fff':'var(--text1)'}"></i></div>`
  ).join('');
  picker.style.display = 'flex';
  const rect = anchorEl.getBoundingClientRect();
  picker.style.top = (rect.bottom + 6) + 'px';
  picker.style.left = Math.min(rect.left, window.innerWidth - 232) + 'px';
}
function selectFolderIcon(icon) {
  if (!iconPickerFolder) return;
  folderIcons[iconPickerFolder] = icon;
  localStorage.setItem('msp-folder-icons', JSON.stringify(folderIcons));
  closeFolderIconPicker();
  render();
  saveConfig();
}
function closeFolderIconPicker() {
  const picker = document.getElementById('folderIconPicker');
  if (picker) picker.style.display = 'none';
  iconPickerFolder = null;
}

applyTheme(localStorage.getItem('msp-theme') || 'Green', false);
applyDensity(currentDensity);
document.getElementById('viewToggleIcon').className = currentView === 'grid' ? 'ti ti-layout-list' : 'ti ti-layout-grid';
setupCardListeners();
setupDragListeners();
loadLinks();
</script>
