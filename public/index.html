<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSP Beacon</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/dist/tabler-icons.min.css">
<style>
:root {
  --bg0: #0d1117;
  --bg1: #161b22;
  --bg2: #1c2128;
  --bg3: #21262d;
  --g1: #E1F5EE;
  --g2: #9FE1CB;
  --g3: #5DCAA5;
  --g4: #1D9E75;
  --g5: #0F6E56;
  --g6: #085041;
  --text0: #e6edf3;
  --text1: #8b949e;
  --text2: #6e7681;
  --border0: #30363d;
  --g4-glow: rgba(29,158,117,.15);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg0); color: var(--text0); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem 3rem; }
.app-header { display: flex; align-items: center; gap: 10px; padding: 1.25rem 0 0; margin-bottom: 4px; }
.app-header i { font-size: 24px; color: var(--g3); }
.app-header span { font-size: 20px; font-weight: 600; color: var(--g2); }
.toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; padding: 1rem 0 0.75rem; border-bottom: 1.5px solid var(--g5); margin-bottom: 1rem; }
input[type=text] { height: 36px; padding: 0 10px; border-radius: 8px; border: 0.5px solid var(--border0); background: var(--bg2); color: var(--text0); font-size: 14px; font-family: inherit; }
input[type=text]:focus { outline: none; border-color: var(--g4); box-shadow: 0 0 0 2px var(--g4-glow); }
select { height: 36px; padding: 0 10px; border-radius: 8px; border: 0.5px solid var(--border0); background: var(--bg2); color: var(--text0); font-size: 14px; cursor: pointer; font-family: inherit; }
select:focus { outline: none; border-color: var(--g4); }
.search-wrap { position: relative; display: flex; align-items: center; flex: 1; min-width: 160px; }
.search-wrap input[type=text] { width: 100%; padding-left: 32px; padding-right: 30px; }
.search-icon { position: absolute; left: 10px; font-size: 15px; color: var(--text2); pointer-events: none; }
.search-clear { position: absolute; right: 6px; width: 22px; height: 22px; border-radius: 50%; border: none; background: var(--bg3); color: var(--text1); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; padding: 0; }
.search-clear:hover { background: var(--g5); color: #fff; }
.btn { display: flex; align-items: center; gap: 6px; white-space: nowrap; padding: 0 14px; height: 36px; border-radius: 8px; border: 0.5px solid var(--border0); background: var(--bg2); color: var(--text0); font-size: 14px; cursor: pointer; font-weight: 500; font-family: inherit; }
.btn:hover { background: var(--bg3); border-color: var(--g5); }
.btn-primary { background: var(--g5); color: #fff; border-color: var(--g6); }
.btn-primary:hover { background: var(--g6); }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; padding-bottom: 1.5rem; }
.card { background: var(--bg1); border: 0.5px solid var(--border0); border-radius: 12px; padding: 14px; cursor: pointer; transition: border-color .15s; display: flex; flex-direction: column; gap: 8px; position: relative; text-decoration: none; }
.card:hover { border-color: var(--g4); box-shadow: 0 0 0 2px var(--g4-glow); }
.card-top { display: flex; align-items: flex-start; gap: 10px; }
.favicon { width: 28px; height: 28px; border-radius: 6px; background: var(--bg3); display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
.favicon img { width: 100%; height: 100%; object-fit: contain; }
.favicon i { font-size: 14px; color: var(--g3); }
.card-title { font-size: 14px; font-weight: 500; color: var(--text0); line-height: 1.3; word-break: break-word; }
.card-url { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-desc { font-size: 13px; color: var(--text1); line-height: 1.5; }
.card-footer { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: auto; padding-top: 4px; }
.tag { font-size: 11px; padding: 3px 8px; border-radius: 20px; background: rgba(15,110,86,.25); color: var(--g2); border: 0.5px solid var(--g5); }
.folder-badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; background: rgba(15,110,86,.25); color: var(--g2); border: 0.5px solid var(--g5); margin-left: auto; display: flex; align-items: center; gap: 4px; }
.card-actions { position: absolute; top: 8px; right: 8px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.icon-btn { width: 26px; height: 26px; border-radius: 8px; border: 0.5px solid var(--g5); background: var(--bg2); color: var(--g3); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 13px; }
.icon-btn:hover { background: var(--g5); color: #fff; }
.empty { text-align: center; padding: 4rem 1rem; color: var(--text2); font-size: 14px; }
.empty i { font-size: 36px; display: block; margin-bottom: 10px; color: var(--g5); }
.folder-section { margin-bottom: 1.5rem; }
.folder-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding: 6px 10px; background: rgba(15,110,86,.15); border-radius: 8px; border: 0.5px solid var(--g5); cursor: pointer; user-select: none; }
.folder-header:hover { background: rgba(15,110,86,.25); }
.folder-chevron { font-size: 14px; color: var(--text2); transition: transform .2s; flex-shrink: 0; }
.folder-chevron.open { transform: rotate(90deg); }
.folder-name { font-size: 13px; font-weight: 500; color: var(--g2); }
.count-pill { font-size: 11px; padding: 1px 7px; border-radius: 20px; background: var(--g5); color: #fff; }
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal { background: var(--bg1); border-radius: 12px; border: 1px solid var(--g5); padding: 1.25rem; width: min(460px, 92vw); display: flex; flex-direction: column; gap: 12px; max-height: 90vh; overflow-y: auto; }
.modal-header { display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--g6); padding-bottom: 10px; }
.modal-header i { font-size: 18px; color: var(--g3); }
.modal h3 { font-size: 16px; font-weight: 500; color: var(--g2); }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 11px; color: var(--g3); font-weight: 500; text-transform: uppercase; letter-spacing: .06em; }
.field input[type=text], .field select { width: 100%; }
.field textarea { width: 100%; height: 72px; resize: vertical; padding: 8px 10px; border-radius: 8px; border: 0.5px solid var(--border0); background: var(--bg2); color: var(--text0); font-size: 14px; font-family: inherit; }
.field textarea:focus { outline: none; border-color: var(--g4); }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; padding-top: 4px; border-top: 0.5px solid var(--bg3); margin-top: 4px; }
.import-drop { border: 1.5px dashed var(--g5); border-radius: 12px; padding: 2rem 1rem; text-align: center; cursor: pointer; color: var(--text1); font-size: 14px; transition: border-color .15s, background .15s; }
.import-drop:hover, .import-drop.drag { border-color: var(--g3); background: rgba(15,110,86,.1); }
.import-drop i { font-size: 28px; display: block; margin-bottom: 8px; color: var(--g3); }
.import-preview { max-height: 200px; overflow-y: auto; border: 0.5px solid var(--g5); border-radius: 8px; }
.import-row { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-bottom: 0.5px solid var(--bg3); }
.import-row:last-child { border-bottom: none; }
.import-row:nth-child(odd) { background: rgba(255,255,255,.02); }
.import-row input[type=checkbox] { width: 14px; height: 14px; cursor: pointer; flex-shrink: 0; accent-color: var(--g4); }
.import-row-info { min-width: 0; flex: 1; }
.import-row-title { font-size: 13px; color: var(--text0); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.import-row-url { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.import-row-folder { font-size: 11px; padding: 1px 6px; border-radius: 20px; background: rgba(15,110,86,.25); color: var(--g2); border: 0.5px solid var(--g4); flex-shrink: 0; }
.import-actions { display: flex; gap: 6px; align-items: center; font-size: 12px; color: var(--text1); }
.import-actions a { cursor: pointer; color: var(--g3); text-decoration: none; }
.import-actions a:hover { text-decoration: underline; }
.notice { font-size: 12px; color: var(--g2); padding: 8px 12px; background: rgba(15,110,86,.15); border-radius: 8px; display: flex; align-items: center; gap: 8px; border: 0.5px solid var(--g5); }
.notice i { color: var(--g3); flex-shrink: 0; }
.toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--bg1); border: 1px solid var(--g5); color: var(--g2); padding: 10px 16px; border-radius: 8px; font-size: 14px; display: flex; align-items: center; gap: 8px; z-index: 200; opacity: 0; transition: opacity .2s; pointer-events: none; }
.toast.show { opacity: 1; pointer-events: auto; }
.toast-undo { background: none; border: 1px solid var(--g4); color: var(--g3); border-radius: 6px; padding: 2px 10px; font-size: 13px; cursor: pointer; font-family: inherit; font-weight: 500; }
.toast-undo:hover { background: var(--g5); color: #fff; }
.saving-indicator { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 4px; margin-left: auto; }
.settings-wrap { position: relative; }
.settings-menu { position: absolute; top: calc(100% + 6px); right: 0; background: var(--bg1); border: 1px solid var(--g5); border-radius: 10px; min-width: 160px; z-index: 50; box-shadow: 0 8px 24px rgba(0,0,0,.4); padding: 4px; display: none; flex-direction: column; }
.settings-menu.open { display: flex; }
.settings-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 7px; font-size: 14px; color: var(--text0); cursor: pointer; background: none; border: none; font-family: inherit; width: 100%; text-align: left; }
.settings-item:hover { background: var(--bg3); color: var(--g2); }
.settings-item i { font-size: 15px; color: var(--g3); }
.theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 4px 0; }
.theme-swatch { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; padding: 10px 6px; border-radius: 10px; border: 1.5px solid transparent; transition: border-color .15s, background .15s; }
.theme-swatch:hover { background: var(--bg3); }
.theme-swatch.active { border-color: var(--g4); background: var(--bg3); }
.swatch-dot { width: 36px; height: 36px; border-radius: 50%; }
.swatch-label { font-size: 12px; color: var(--text1); }
.theme-swatch.active .swatch-label { color: var(--g2); }
.drag-handle { width: 26px; height: 26px; border-radius: 8px; border: 0.5px solid var(--g5); background: var(--bg2); color: var(--g3); display: flex; align-items: center; justify-content: center; cursor: grab; font-size: 13px; }
.drag-handle:hover { background: var(--g5); color: #fff; }
.drag-handle:active { cursor: grabbing; }
.folder-drag-handle { display: flex; align-items: center; justify-content: center; width: 18px; cursor: grab; color: var(--text2); font-size: 13px; flex-shrink: 0; }
.folder-drag-handle:hover { color: var(--g3); }
.folder-drag-handle:active { cursor: grabbing; }
.card.dragging { opacity: 0.35; }
.card.drag-over { border-color: var(--g3) !important; box-shadow: 0 0 0 2px var(--g4-glow), 0 -3px 0 var(--g3) !important; }
.folder-header.dragging { opacity: 0.5; }
.folder-header.drag-over { background: rgba(15,110,86,.4) !important; border-color: var(--g3) !important; border-style: dashed !important; }
.card.selected { border-color: var(--g4) !important; background: rgba(29,158,117,.1); }
.card-check { position: absolute; top: 8px; left: 8px; width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid var(--g4); background: var(--bg2); display: flex; align-items: center; justify-content: center; z-index: 2; flex-shrink: 0; }
.card-check.checked { background: var(--g4); }
.card-check i { font-size: 11px; color: #fff; display: none; }
.card-check.checked i { display: flex; }
.card.select-mode { cursor: default; }
.card.select-mode:hover { border-color: var(--g5); box-shadow: none; }
.card.select-mode.selected:hover { border-color: var(--g4) !important; }
.bulk-bar { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--bg1); border: 1px solid var(--g5); border-radius: 12px; padding: 10px 16px; display: flex; align-items: center; gap: 10px; z-index: 150; box-shadow: 0 8px 32px rgba(0,0,0,.5); white-space: nowrap; }
.bulk-bar.hidden { display: none; }
.bulk-count { font-size: 14px; font-weight: 500; color: var(--g2); min-width: 72px; }
.bulk-divider { width: 1px; height: 22px; background: var(--border0); flex-shrink: 0; }
.btn.active { background: var(--g5); border-color: var(--g4); color: #fff; }
.star-btn { background: none; border: none; padding: 0; cursor: pointer; font-size: 15px; color: var(--text2); display: flex; align-items: center; flex-shrink: 0; transition: color .15s; }
.star-btn:hover { color: #F5A623; }
.star-btn.active { color: #F5A623; }
.favorites-section { margin-bottom: 1.5rem; }
.favorites-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding: 6px 10px; background: rgba(245,166,35,.08); border-radius: 8px; border: 0.5px solid rgba(245,166,35,.35); cursor: pointer; user-select: none; }
.favorites-header:hover { background: rgba(245,166,35,.15); }
.favorites-title { font-size: 13px; font-weight: 500; color: #F5A623; }
.subfolder-header { display: flex; align-items: center; gap: 6px; padding: 4px 8px; margin: 8px 0 4px 8px; border-left: 2px solid rgba(100,200,100,.4); cursor: pointer; user-select: none; }
.subfolder-header:hover { background: rgba(15,110,86,.12); border-radius: 0 6px 6px 0; }
.subfolder-header.drag-over { background: rgba(15,110,86,.3) !important; border-left-color: var(--g3) !important; border-radius: 0 6px 6px 0; }
.subfolder-title { font-size: 12px; font-weight: 500; color: var(--text2); }
.subfolder-grid { padding-left: 12px; }
.title-wrap { position: relative; display: flex; align-items: center; }
.title-wrap input[type=text] { width: 100%; }
.title-spinner { position: absolute; right: 8px; font-size: 14px; color: var(--text2); pointer-events: none; display: none; animation: spin 1s linear infinite; }
.title-wrap.fetching .title-spinner { display: block; }
.title-wrap.fetching input[type=text] { opacity: 0.55; }
.status-badge { position: absolute; top: 7px; left: 7px; width: 20px; height: 20px; border-radius: 5px; background: rgba(226,75,74,.15); border: 0.5px solid #E24B4A; display: flex; align-items: center; justify-content: center; z-index: 2; pointer-events: none; }
.status-badge i { font-size: 11px; color: #E24B4A; }
</style>
</head>
<body>
<div class="container">
  <div class="app-header">
    <i class="ti ti-bookmarks"></i>
    <span>MSP Beacon</span>
    <div class="saving-indicator" id="saveStatus"></div>
  </div>
  <div class="toolbar">
    <div class="search-wrap">
      <i class="ti ti-search search-icon"></i>
      <input type="text" id="search" placeholder="Search links… (press /)" oninput="debouncedRender()">
      <button class="search-clear" id="searchClear" style="display:none" onclick="clearSearch()"><i class="ti ti-x"></i></button>
    </div>
    <select id="folderFilter" onchange="render()"><option value="">All folders</option></select>
    <select id="tagFilter" onchange="render()"><option value="">All tags</option></select>
    <select id="sortSelect" onchange="onSortChange()">
      <option value="manual">Manual order</option>
      <option value="az">A → Z</option>
      <option value="za">Z → A</option>
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
    </select>
    <button class="btn" id="checkLinksBtn" onclick="checkLinks()"><i class="ti ti-wifi"></i> Check links</button>
    <button class="btn" id="selectBtn" onclick="toggleSelectMode()"><i class="ti ti-checkbox"></i> Select</button>
    <button class="btn btn-primary" onclick="openModal()"><i class="ti ti-plus"></i> Add link</button>
    <div class="settings-wrap">
      <button class="btn" id="settingsBtn" onclick="toggleSettings(event)"><i class="ti ti-settings"></i> Settings</button>
      <div class="settings-menu" id="settingsMenu">
        <button class="settings-item" onclick="closeSettings();openTheme()"><i class="ti ti-palette"></i> Theme</button>
        <button class="settings-item" onclick="closeSettings();openImport()"><i class="ti ti-file-import"></i> Import</button>
        <button class="settings-item" onclick="closeSettings();exportLinks()"><i class="ti ti-file-export"></i> Export</button>
      </div>
    </div>
  </div>
  <div id="content"></div>
</div>

<div id="modalBg" class="modal-bg" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-header"><i class="ti ti-link"></i><h3 id="modalTitle">Add link</h3></div>
    <div class="field"><label>URL</label><input type="text" id="mUrl" placeholder="https://…" oninput="autoTitle()" onblur="fetchPageTitle()"></div>
    <div class="field"><label>Title</label><div class="title-wrap" id="titleWrap"><input type="text" id="mTitle" placeholder="Site name"><i class="ti ti-loader title-spinner" id="titleSpinner"></i></div></div>
    <div class="field"><label>Description</label><textarea id="mDesc" placeholder="What is this?"></textarea></div>
    <div class="field"><label>Folder</label>
      <div style="display:flex;gap:8px">
        <select id="mFolder" style="flex:1" onchange="updateSubfolderDatalist()"></select>
        <input type="text" id="mNewFolder" placeholder="New folder…" style="flex:1" oninput="updateSubfolderDatalist()">
      </div>
    </div>
    <div class="field"><label>Sub-folder <span style="font-size:10px;color:var(--text2);text-transform:none;letter-spacing:0">(optional)</span></label>
      <input type="text" id="mSubfolder" placeholder="Sub-folder name…" list="subfolderList" autocomplete="off" onfocus="updateSubfolderDatalist()">
      <datalist id="subfolderList"></datalist>
    </div>
    <div class="field"><label>Tags (comma separated)</label><input type="text" id="mTags" placeholder="e.g. tools, dev, reference"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveLink()"><i class="ti ti-check"></i> Save</button>
    </div>
  </div>
</div>

<div id="importBg" class="modal-bg" style="display:none" onclick="if(event.target===this)closeImport()">
  <div class="modal" role="dialog" aria-modal="true" style="width:min(540px,92vw)">
    <div class="modal-header"><i class="ti ti-file-import"></i><h3>Import bookmarks</h3></div>
    <div class="notice"><i class="ti ti-info-circle"></i> Export from Chrome, Edge, or Firefox as an HTML file, then drop it here.</div>
    <div id="dropZone" class="import-drop" onclick="document.getElementById('fileIn').click()" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="handleDrop(event)">
      <i class="ti ti-upload"></i>
      Drop your bookmarks.html here<br><span style="font-size:12px;color:var(--text2)">or click to browse</span>
    </div>
    <input type="file" id="fileIn" accept=".html,.htm" style="display:none" onchange="handleFile(this.files[0])">
    <div id="importPreviewWrap" style="display:none;flex-direction:column;gap:8px">
      <div class="import-actions">
        <span id="importCount" style="font-weight:500;color:var(--g2)"></span>&nbsp;
        <a onclick="toggleAll(true)">Select all</a> · <a onclick="toggleAll(false)">Deselect all</a>
      </div>
      <div id="importPreview" class="import-preview"></div>
      <div class="field"><label>Put all imports in folder (optional)</label>
        <div style="display:flex;gap:8px">
          <select id="impFolder" style="flex:1"><option value="">No folder</option></select>
          <input type="text" id="impNewFolder" placeholder="New folder…" style="flex:1">
        </div>
      </div>
      <div class="field"><label>Add tags to all imports (optional)</label>
        <input type="text" id="impTags" placeholder="e.g. imported, bookmarks">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeImport()">Cancel</button>
      <button class="btn btn-primary" id="importBtn" style="display:none" onclick="doImport()"><i class="ti ti-file-import"></i> Import selected</button>
    </div>
  </div>
</div>

<div id="themeBg" class="modal-bg" style="display:none" onclick="if(event.target===this)closeTheme()">
  <div class="modal" role="dialog" aria-modal="true" style="width:min(360px,92vw)">
    <div class="modal-header"><i class="ti ti-palette"></i><h3>Choose Theme</h3></div>
    <div class="theme-grid" id="themeGrid"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeTheme()">Close</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><i class="ti ti-check" id="toastIcon"></i> <span id="toastMsg"></span><button class="toast-undo" id="toastUndo" style="display:none" onclick="undoDelete()">Undo</button></div>

<div class="bulk-bar hidden" id="bulkBar">
  <span class="bulk-count" id="bulkCount">0 selected</span>
  <div class="bulk-divider"></div>
  <a style="font-size:13px;color:var(--g3);cursor:pointer;text-decoration:none" onclick="selectAllVisible()">All</a>
  <a style="font-size:13px;color:var(--text1);cursor:pointer;text-decoration:none" onclick="clearSelection()">None</a>
  <div class="bulk-divider"></div>
  <select id="bulkMoveFolder" onchange="onBulkFolderChange(this)" style="height:32px;font-size:13px"><option value="">Move to folder…</option></select>
  <input type="text" id="bulkMoveSubfolder" placeholder="Sub-folder (optional)…" list="bulkSubfolderList" autocomplete="off" style="height:32px;font-size:13px;width:150px;display:none">
  <datalist id="bulkSubfolderList"></datalist>
  <button id="bulkMoveConfirm" class="btn" style="height:32px;font-size:13px;padding:0 10px;display:none" onclick="confirmBulkMove()"><i class="ti ti-arrow-right"></i> Move</button>
  <input type="text" id="bulkTagInput" placeholder="Add tag…" style="height:32px;font-size:13px;width:110px" onkeydown="if(event.key==='Enter')bulkAddTag()">
  <button class="btn" style="height:32px;font-size:13px;padding:0 10px" onclick="bulkAddTag()"><i class="ti ti-tag"></i> Tag</button>
  <div class="bulk-divider"></div>
  <button class="btn" style="height:32px;font-size:13px;padding:0 10px;color:#E24B4A;border-color:#b91c1c" onclick="bulkDelete()"><i class="ti ti-trash"></i> Delete</button>
  <button class="btn" style="height:32px;font-size:13px;padding:0 10px" onclick="exitSelectMode()" title="Exit select mode"><i class="ti ti-x"></i></button>
</div>

<script>
let links = [];
let linkStatus = {};
let editId = null;
let parsedBookmarks = [];
let saveTimer = null;
let collapsedFolders = new Set(JSON.parse(localStorage.getItem('msp-collapsed') || '[]'));
let collapsedSubfolders = JSON.parse(localStorage.getItem('msp-subfolder-collapsed') || '{}');
let folderOrder = JSON.parse(localStorage.getItem('msp-folder-order') || 'null');
let dragId = null;
let dragFolder = null;
let dragOverEl = null;
let selectMode = false;
let selectedIds = new Set();
let visibleIds = [];
let favoritesCollapsed = JSON.parse(localStorage.getItem('msp-fav-collapsed') || 'false');
let searchDebounceTimer = null;
function debouncedRender() { clearTimeout(searchDebounceTimer); searchDebounceTimer = setTimeout(render, 150); }
let currentSort = localStorage.getItem('msp-sort') || 'manual';
function onSortChange() {
  currentSort = document.getElementById('sortSelect').value;
  localStorage.setItem('msp-sort', currentSort);
  render();
}
function sortLinks(arr) {
  if (currentSort === 'manual') return arr;
  const copy = arr.slice();
  if (currentSort === 'az') copy.sort((a, b) => (a.title || '').toLowerCase().localeCompare((b.title || '').toLowerCase()));
  else if (currentSort === 'za') copy.sort((a, b) => (b.title || '').toLowerCase().localeCompare((a.title || '').toLowerCase()));
  else if (currentSort === 'newest') copy.sort((a, b) => parseInt(b.id, 36) - parseInt(a.id, 36));
  else if (currentSort === 'oldest') copy.sort((a, b) => parseInt(a.id, 36) - parseInt(b.id, 36));
  return copy;
}

async function loadLinks() {
  try {
    const res = await fetch('/api/links');
    const data = await res.json();
    links = Array.isArray(data) ? data : [];
    render();
  } catch(e) {
    console.error('Failed to load links', e);
    showToast('Failed to load links from server', true);
  }
}

async function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    const status = document.getElementById('saveStatus');
    status.innerHTML = '<i class="ti ti-loader" style="animation:spin 1s linear infinite"></i> Saving…';
    try {
      const res = await fetch('/api/links', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(links)
      });
      if (!res.ok) throw new Error('Server error ' + res.status);
      status.innerHTML = '<i class="ti ti-circle-check" style="color:var(--g3)"></i> Saved';
      setTimeout(() => status.innerHTML = '', 2000);
    } catch(e) {
      status.innerHTML = '<i class="ti ti-alert-circle" style="color:#E24B4A"></i> Save failed';
    }
  }, 400);
}

let toastTimer = null;
let pendingDelete = null; // { saved: [...links], timer }

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toastUndo').style.display = 'none';
  document.getElementById('toastIcon').className = isError ? 'ti ti-alert-circle' : 'ti ti-check';
  t.style.borderColor = isError ? '#E24B4A' : '';
  t.style.color = isError ? '#E24B4A' : '';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

function showUndoToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toastUndo').style.display = '';
  document.getElementById('toastIcon').className = 'ti ti-trash';
  t.style.borderColor = '';
  t.style.color = '';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 5500);
}

function undoDelete() {
  if (!pendingDelete) return;
  clearTimeout(pendingDelete.timer);
  links = pendingDelete.saved;
  pendingDelete = null;
  render();
  showToast('Restored');
}

function getFavicon(u) { try { return 'https://www.google.com/s2/favicons?domain=' + new URL(u).hostname + '&sz=64'; } catch { return null; } }
function getDomain(u) { try { return new URL(u).hostname.replace('www.', ''); } catch { return u; } }
function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function allFolders() { return [...new Set(links.map(l => l.folder).filter(Boolean))].sort(); }
function getOrderedFolders(names) {
  if (!folderOrder) return names.slice().sort();
  const known = new Set(folderOrder);
  const fresh = names.filter(f => !known.has(f)).sort();
  return [...folderOrder.filter(f => names.includes(f)), ...fresh];
}
function allTags() { return [...new Set(links.flatMap(l => l.tags || []))].sort(); }

function subfoldersByFolder(folderName) {
  return [...new Set(links.filter(l => l.folder === folderName && l.subfolder).map(l => l.subfolder))].sort();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const clearBtn = document.getElementById('searchClear');
  if (clearBtn) clearBtn.style.display = q ? '' : 'none';
  const ff = document.getElementById('folderFilter').value;
  const tf = document.getElementById('tagFilter').value;
  const fs = document.getElementById('folderFilter'), ts = document.getElementById('tagFilter');
  fs.innerHTML = '<option value="">All folders</option>' + allFolders().map(f => `<option value="${esc(f)}"${f===ff?' selected':''}>${esc(f)}</option>`).join('');
  ts.innerHTML = '<option value="">All tags</option>' + allTags().map(t => `<option value="${esc(t)}"${t===tf?' selected':''}>${esc(t)}</option>`).join('');
  const sortEl = document.getElementById('sortSelect');
  if (sortEl) sortEl.value = currentSort;
  let fil = links.filter(l => {
    if (ff && l.folder !== ff) return false;
    if (tf && !(l.tags || []).some(t => t.toLowerCase() === tf.toLowerCase())) return false;
    if (q && !((l.title+l.url+l.desc+(l.folder||'')+(l.subfolder||'')+(l.tags||[]).join(' ')).toLowerCase().includes(q))) return false;
    return true;
  });
  fil = sortLinks(fil);
  visibleIds = fil.map(l => l.id);
  const c = document.getElementById('content');
  if (!fil.length) {
    c.innerHTML = `<div class="empty"><i class="ti ti-bookmarks"></i>${links.length ? 'No results match your filters.' : 'No links yet — click <strong>Add link</strong> or <strong>Import</strong> to get started.'}</div>`;
    return;
  }
  if (ff || q || tf) { c.innerHTML = `<div class="grid">${fil.map(cardHtml).join('')}</div>`; return; }
  const byF = {}, noF = [];
  fil.forEach(l => { l.folder ? (byF[l.folder] = byF[l.folder] || [], byF[l.folder].push(l)) : noF.push(l); });
  let html = '';
  const favs = fil.filter(l => l.favorite);
  if (favs.length) {
    html += `<div class="favorites-section"><div class="favorites-header" onclick="toggleFavorites()"><i class="ti ti-chevron-right folder-chevron${favoritesCollapsed ? '' : ' open'}"></i><i class="ti ti-star-filled" style="font-size:15px;color:#F5A623"></i><span class="favorites-title">Favorites</span><span class="count-pill" style="background:rgba(245,166,35,.3);color:#F5A623">${favs.length}</span></div>${favoritesCollapsed ? '' : `<div class="grid">${favs.map(cardHtml).join('')}</div>`}</div>`;
  }
  if (noF.length) html += `<div class="grid">${noF.map(cardHtml).join('')}</div>`;
  getOrderedFolders(Object.keys(byF)).forEach(f => {
    const collapsed = collapsedFolders.has(f);
    let folderContent = '';
    if (!collapsed) {
      folderContent = renderFolderContents(f, byF[f]);
    }
    html += `<div class="folder-section"><div class="folder-header" onclick="toggleFolder(this.dataset.folder)" data-folder="${esc(f)}"><div class="folder-drag-handle" draggable="true" title="Drag to reorder folder" onclick="event.stopPropagation()"><i class="ti ti-grip-vertical"></i></div><i class="ti ti-chevron-right folder-chevron${collapsed ? '' : ' open'}"></i><i class="ti ti-folder" style="font-size:16px;color:var(--g4)"></i><span class="folder-name">${esc(f)}</span><span class="count-pill">${byF[f].length}</span></div>${folderContent}</div>`;
  });
  c.innerHTML = html;
}

function renderFolderContents(folderName, folderLinks) {
  const rootLinks = folderLinks.filter(l => !l.subfolder);
  const bySubfolder = {};
  folderLinks.filter(l => l.subfolder).forEach(l => {
    bySubfolder[l.subfolder] = bySubfolder[l.subfolder] || [];
    bySubfolder[l.subfolder].push(l);
  });

  let html = '';
  if (rootLinks.length) {
    html += `<div class="grid">${rootLinks.map(cardHtml).join('')}</div>`;
  }

  Object.keys(bySubfolder).sort().forEach(sf => {
    const key = JSON.stringify([folderName, sf]);
    const sfCollapsed = !!collapsedSubfolders[key];
    const sfLinks = bySubfolder[sf];
    html += `<div class="subfolder-header" onclick="toggleSubfolder('${esc(folderName)}','${esc(sf)}')" data-folder="${esc(folderName)}" data-subfolder="${esc(sf)}">`;
    html += `<i class="ti ti-chevron-right folder-chevron${sfCollapsed ? '' : ' open'}" style="font-size:12px"></i>`;
    html += `<i class="ti ti-folder" style="font-size:12px;color:var(--g4);opacity:.7"></i>`;
    html += `<span class="subfolder-title">${esc(sf)}</span>`;
    html += `<span class="count-pill" style="font-size:10px;padding:1px 5px;background:rgba(15,110,86,.5)">${sfLinks.length}</span>`;
    html += `</div>`;
    if (!sfCollapsed) {
      html += `<div class="subfolder-grid"><div class="grid">${sfLinks.map(cardHtml).join('')}</div></div>`;
    }
  });

  return html;
}

function cardHtml(l) {
  const fav = getFavicon(l.url);
  const fi = fav ? `<img src="${fav}" alt="" onerror="this.style.display='none';this.nextSibling.style.display='flex'"><span style="display:none"><i class="ti ti-world"></i></span>` : `<i class="ti ti-world"></i>`;
  const starBtn = selectMode ? '' : `<button class="star-btn${l.favorite ? ' active' : ''}" data-action="favorite" data-id="${esc(l.id)}" title="${l.favorite ? 'Remove from favorites' : 'Add to favorites'}"><i class="ti ti-star${l.favorite ? '-filled' : ''}"></i></button>`;
  const footer = `<div class="card-footer">
      ${starBtn}
      ${(l.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('')}
      ${l.folder ? `<span class="folder-badge"><i class="ti ti-folder" style="font-size:11px"></i> ${esc(l.folder)}${l.subfolder ? ' / ' + esc(l.subfolder) : ''}</span>` : ''}
    </div>`;
  const top = `<div class="card-top"><div class="favicon">${fi}</div>
      <div style="min-width:0"><div class="card-title">${esc(l.title)}</div><div class="card-url">${esc(getDomain(l.url))}</div></div>
    </div>`;
  const statusBadge = (linkStatus[l.id] === 'broken' || linkStatus[l.id] === 'timeout')
    ? `<div class="status-badge" title="${linkStatus[l.id] === 'timeout' ? 'Link timed out' : 'Link appears broken'}"><i class="ti ti-alert-triangle"></i></div>`
    : '';
  if (selectMode) {
    const checked = selectedIds.has(l.id);
    return `<div class="card select-mode${checked ? ' selected' : ''}" data-id="${esc(l.id)}">
      <div class="card-check${checked ? ' checked' : ''}"><i class="ti ti-check"></i></div>
      ${statusBadge}
      ${top}
      ${l.desc ? `<div class="card-desc">${esc(l.desc)}</div>` : ''}
      ${footer}
    </div>`;
  }
  return `<div class="card" data-id="${esc(l.id)}" data-url="${esc(l.url)}">
    <div class="card-actions">
      <div class="drag-handle" draggable="true" title="Drag to reorder"><i class="ti ti-grip-vertical"></i></div>
      <button class="icon-btn" title="Copy URL" data-action="copy" data-id="${esc(l.id)}" data-url="${esc(l.url)}"><i class="ti ti-copy"></i></button>
      <button class="icon-btn" title="Edit" data-action="edit" data-id="${esc(l.id)}"><i class="ti ti-edit"></i></button>
      <button class="icon-btn" title="Delete" data-action="delete" data-id="${esc(l.id)}"><i class="ti ti-trash"></i></button>
    </div>
    ${statusBadge}
    ${top}
    ${l.desc ? `<div class="card-desc">${esc(l.desc)}</div>` : ''}
    ${footer}
  </div>`;
}

function openModal(id) {
  editId = id || null;
  const l = id ? links.find(x => x.id === id) : null;
  document.getElementById('modalTitle').textContent = l ? 'Edit link' : 'Add link';
  document.getElementById('mUrl').value = l ? l.url : '';
  document.getElementById('mTitle').value = l ? l.title : '';
  document.getElementById('mDesc').value = l ? l.desc : '';
  document.getElementById('mTags').value = l ? (l.tags || []).join(', ') : '';
  document.getElementById('mNewFolder').value = '';
  document.getElementById('mSubfolder').value = l ? (l.subfolder || '') : '';
  const mf = document.getElementById('mFolder');
  mf.innerHTML = '<option value="">No folder</option>' + allFolders().map(f => `<option value="${esc(f)}"${l&&l.folder===f?' selected':''}>${esc(f)}</option>`).join('');
  updateSubfolderDatalist();
  document.getElementById('modalBg').style.display = 'flex';
  setTimeout(() => document.getElementById('mUrl').focus(), 50);
}
function closeModal() { document.getElementById('modalBg').style.display = 'none'; editId = null; }
function autoTitle() {
  const u = document.getElementById('mUrl').value.trim();
  const t = document.getElementById('mTitle');
  if (!t.value && u && !/^https?:\/\//i.test(u)) {
    try { t.value = new URL(u).hostname.replace('www.', ''); } catch {}
  }
}

async function fetchPageTitle() {
  if (editId) return;
  const u = document.getElementById('mUrl').value.trim();
  const t = document.getElementById('mTitle');
  if (!u || !/^https?:\/\//i.test(u)) return;
  if (t.value) return;
  const wrap = document.getElementById('titleWrap');
  wrap.classList.add('fetching');
  try {
    const res = await fetch('/api/fetch-title?url=' + encodeURIComponent(u));
    const data = await res.json();
    if (!t.value) {
      t.value = data.title || new URL(u).hostname.replace('www.', '');
    }
  } catch {
    if (!t.value) { try { t.value = new URL(u).hostname.replace('www.', ''); } catch {} }
  }
  wrap.classList.remove('fetching');
}

function updateSubfolderDatalist() {
  const nf = document.getElementById('mNewFolder').value.trim();
  const selectedFolder = nf || document.getElementById('mFolder').value || '';
  const subs = selectedFolder ? subfoldersByFolder(selectedFolder) : [];
  const dl = document.getElementById('subfolderList');
  dl.innerHTML = subs.map(s => `<option value="${esc(s)}">` ).join('');
}

function saveLink() {
  const url = document.getElementById('mUrl').value.trim();
  const title = document.getElementById('mTitle').value.trim();
  if (!url || !title) { alert('URL and title are required.'); return; }
  const nf = document.getElementById('mNewFolder').value.trim();
  const folder = nf || document.getElementById('mFolder').value || '';
  const subfolder = document.getElementById('mSubfolder').value.trim() || null;
  const tags = document.getElementById('mTags').value.split(',').map(t => t.trim()).filter(Boolean);
  const desc = document.getElementById('mDesc').value.trim();
  if (editId) {
    const i = links.findIndex(l => l.id === editId);
    if (i > -1) links[i] = { ...links[i], url, title, desc, folder, subfolder, tags };
  } else {
    links.unshift({ id: Date.now().toString(36) + Math.random().toString(36).slice(2), url, title, desc, folder, subfolder, tags });
  }
  const wasEditing = !!editId;
  save(); closeModal(); render();
  showToast(wasEditing ? 'Link updated' : 'Link saved');
}
function copyUrl(url, btn) {
  navigator.clipboard.writeText(url).then(() => {
    const icon = btn.querySelector('i');
    icon.className = 'ti ti-check';
    btn.style.color = 'var(--g3)';
    setTimeout(() => { icon.className = 'ti ti-copy'; btn.style.color = ''; }, 1500);
  });
}
function editLink(id) { openModal(id); }
function deleteLink(id) {
  if (pendingDelete) { clearTimeout(pendingDelete.timer); save(); }
  const saved = links.slice();
  links = links.filter(l => l.id !== id);
  render();
  pendingDelete = {
    saved,
    timer: setTimeout(() => { pendingDelete = null; save(); }, 5000)
  };
  showUndoToast('Link deleted — Undo?');
}

function openImport() {
  parsedBookmarks = [];
  document.getElementById('importPreviewWrap').style.display = 'none';
  document.getElementById('importBtn').style.display = 'none';
  document.getElementById('dropZone').style.display = '';
  document.getElementById('fileIn').value = '';
  document.getElementById('impTags').value = '';
  document.getElementById('impNewFolder').value = '';
  const fs = document.getElementById('impFolder');
  fs.innerHTML = '<option value="">No folder</option>' + allFolders().map(f => `<option value="${esc(f)}">${esc(f)}</option>`).join('');
  document.getElementById('importBg').style.display = 'flex';
}
function closeImport() { document.getElementById('importBg').style.display = 'none'; }
function handleDrop(e) { e.preventDefault(); document.getElementById('dropZone').classList.remove('drag'); const f = e.dataTransfer.files[0]; if (f) handleFile(f); }
function handleFile(file) { if (!file) return; const r = new FileReader(); r.onload = e => parseBookmarks(e.target.result); r.readAsText(file); }
function parseBookmarks(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const res = [];
  function walk(dl, path) {
    for (const ch of (dl ? dl.children : [])) {
      if (ch.tagName !== 'DT') continue;
      const a = ch.querySelector(':scope > A'), h3 = ch.querySelector(':scope > H3'), dl2 = ch.querySelector(':scope > DL');
      if (a) { const u = a.getAttribute('HREF') || '', t = a.textContent.trim() || getDomain(u); if (u && !u.startsWith('javascript:') && !u.startsWith('place:') && !u.startsWith('data:')) res.push({ url: u, title: t, folder: path }); }
      else if (h3 && dl2) { const n = h3.textContent.trim(); const skip = ['Bookmarks bar','Bookmarks Bar','Bookmarks toolbar','Bookmarks Toolbar','Other bookmarks','Other Bookmarks','Mobile bookmarks','Mobile Bookmarks']; walk(dl2, skip.includes(n) ? path : (path ? path + ' / ' + n : n)); }
    }
  }
  walk(doc.querySelector('DL'), '');
  if (!res.length) { alert('No bookmarks found. Make sure this is a valid browser bookmark export.'); return; }
  parsedBookmarks = res; showPreview();
}
function showPreview() {
  document.getElementById('dropZone').style.display = 'none';
  document.getElementById('importPreviewWrap').style.display = 'flex';
  document.getElementById('importBtn').style.display = 'flex';
  document.getElementById('importCount').textContent = parsedBookmarks.length + ' bookmarks found';
  document.getElementById('importPreview').innerHTML = parsedBookmarks.map((b, i) => `
    <div class="import-row"><input type="checkbox" id="imp_${i}" checked>
      <div class="import-row-info"><div class="import-row-title">${esc(b.title)}</div><div class="import-row-url">${esc(b.url)}</div></div>
      ${b.folder ? `<span class="import-row-folder">${esc(b.folder)}</span>` : ''}
    </div>`).join('');
}
function toggleAll(v) { parsedBookmarks.forEach((_, i) => { const c = document.getElementById('imp_' + i); if (c) c.checked = v; }); }
function doImport() {
  const of2 = document.getElementById('impNewFolder').value.trim() || document.getElementById('impFolder').value || '';
  const et = document.getElementById('impTags').value.split(',').map(t => t.trim()).filter(Boolean);
  const eu = new Set(links.map(l => l.url));
  let added = 0, skipped = 0;
  parsedBookmarks.forEach((b, i) => {
    const cb = document.getElementById('imp_' + i);
    if (!cb || !cb.checked) return;
    if (eu.has(b.url)) { skipped++; return; }
    links.unshift({ id: Date.now().toString(36) + Math.random().toString(36).slice(2) + i, url: b.url, title: b.title, desc: '', folder: of2 || b.folder || '', tags: [...et] });
    eu.add(b.url); added++;
  });
  save(); closeImport(); render();
  showToast(`${added} links imported${skipped ? ', ' + skipped + ' duplicates skipped' : ''}`);
}

const THEMES = {
  Green:  { g1:'#E1F5EE', g2:'#9FE1CB', g3:'#5DCAA5', g4:'#1D9E75', g5:'#0F6E56', g6:'#085041', glow:'rgba(29,158,117,.15)' },
  Blue:   { g1:'#DBEAFE', g2:'#93C5FD', g3:'#60A5FA', g4:'#2563EB', g5:'#1E40AF', g6:'#1E3A8A', glow:'rgba(37,99,235,.15)' },
  Purple: { g1:'#EDE9FE', g2:'#C4B5FD', g3:'#A78BFA', g4:'#7C3AED', g5:'#6D28D9', g6:'#4C1D95', glow:'rgba(124,58,237,.15)' },
  Teal:   { g1:'#CCFBF1', g2:'#5EEAD4', g3:'#2DD4BF', g4:'#0D9488', g5:'#0F766E', g6:'#115E59', glow:'rgba(13,148,136,.15)' },
  Orange: { g1:'#FEF3C7', g2:'#FCD34D', g3:'#F59E0B', g4:'#D97706', g5:'#B45309', g6:'#92400E', glow:'rgba(217,119,6,.15)' },
  Red:    { g1:'#FEE2E2', g2:'#FCA5A5', g3:'#F87171', g4:'#DC2626', g5:'#B91C1C', g6:'#7F1D1D', glow:'rgba(220,38,38,.15)' },
};

function applyTheme(name) {
  const t = THEMES[name] || THEMES.Green;
  const r = document.documentElement.style;
  r.setProperty('--g1', t.g1); r.setProperty('--g2', t.g2); r.setProperty('--g3', t.g3);
  r.setProperty('--g4', t.g4); r.setProperty('--g5', t.g5); r.setProperty('--g6', t.g6);
  r.setProperty('--g4-glow', t.glow);
  localStorage.setItem('msp-theme', name);
  document.querySelectorAll('.theme-swatch').forEach(el => {
    el.classList.toggle('active', el.dataset.theme === name);
  });
}

function openTheme() {
  const saved = localStorage.getItem('msp-theme') || 'Green';
  const grid = document.getElementById('themeGrid');
  grid.innerHTML = Object.entries(THEMES).map(([name, t]) => `
    <div class="theme-swatch${name===saved?' active':''}" data-theme="${name}" onclick="applyTheme('${name}')">
      <div class="swatch-dot" style="background:linear-gradient(135deg,${t.g3},${t.g5})"></div>
      <span class="swatch-label">${name}</span>
    </div>`).join('');
  document.getElementById('themeBg').style.display = 'flex';
}
function closeTheme() { document.getElementById('themeBg').style.display = 'none'; }

function toggleSettings(e) {
  e.stopPropagation();
  document.getElementById('settingsMenu').classList.toggle('open');
}
function closeSettings() {
  document.getElementById('settingsMenu').classList.remove('open');
}
document.addEventListener('click', () => closeSettings());

function clearSearch() {
  const s = document.getElementById('search');
  s.value = '';
  document.getElementById('searchClear').style.display = 'none';
  render();
  s.focus();
}

document.addEventListener('keydown', e => {
  const s = document.getElementById('search');
  if ((e.key === '/' || (e.ctrlKey && e.key === 'k')) && !e.target.matches('input,textarea,select')) {
    e.preventDefault();
    s.focus();
    s.select();
  }
  if (e.key === 'Escape' && document.activeElement === s) {
    clearSearch();
    s.blur();
  }
});

function toggleFolder(name) {
  if (collapsedFolders.has(name)) collapsedFolders.delete(name);
  else collapsedFolders.add(name);
  localStorage.setItem('msp-collapsed', JSON.stringify([...collapsedFolders]));
  render();
}

function toggleSubfolder(folderName, subfolder) {
  const key = JSON.stringify([folderName, subfolder]);
  collapsedSubfolders[key] = !collapsedSubfolders[key];
  localStorage.setItem('msp-subfolder-collapsed', JSON.stringify(collapsedSubfolders));
  render();
}

function setupCardListeners() {
  const content = document.getElementById('content');
  content.addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (btn) {
      const action = btn.dataset.action;
      const id = btn.dataset.id;
      if (action === 'copy') copyUrl(btn.dataset.url, btn);
      else if (action === 'edit') editLink(id);
      else if (action === 'delete') deleteLink(id);
      else if (action === 'favorite') toggleFavorite(id);
      return;
    }
    const card = e.target.closest('.card[data-id]');
    if (!card) return;
    if (card.classList.contains('select-mode')) toggleSelect(card.dataset.id);
    else window.open(card.dataset.url, '_blank');
  });
}

function setupDragListeners() {
  const content = document.getElementById('content');

  content.addEventListener('dragstart', e => {
    const handle = e.target.closest('.drag-handle');
    const folderHandle = e.target.closest('.folder-drag-handle');
    if (handle) {
      const card = handle.closest('.card[data-id]');
      if (!card) return;
      dragId = card.dataset.id;
      dragFolder = null;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', dragId);
      e.dataTransfer.setDragImage(card, 20, 20);
      setTimeout(() => card.classList.add('dragging'), 0);
    } else if (folderHandle) {
      const header = folderHandle.closest('.folder-header[data-folder]');
      if (!header) return;
      dragFolder = header.dataset.folder;
      dragId = null;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', dragFolder);
      e.dataTransfer.setDragImage(header, 20, 10);
      setTimeout(() => header.classList.add('dragging'), 0);
    }
  });

  content.addEventListener('dragover', e => {
    if (!dragId && !dragFolder) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    let newTarget = null;
    if (dragId) {
      const card = e.target.closest('.card[data-id]');
      if (card && card.dataset.id !== dragId) {
        newTarget = card;
      } else if (!card) {
        const sfHeader = e.target.closest('.subfolder-header[data-subfolder]');
        if (sfHeader) {
          newTarget = sfHeader;
        } else {
          const header = e.target.closest('.folder-header[data-folder]');
          if (header) newTarget = header;
        }
      }
    } else if (dragFolder) {
      const header = e.target.closest('.folder-header[data-folder]');
      if (header && header.dataset.folder !== dragFolder) newTarget = header;
    }
    if (newTarget !== dragOverEl) {
      if (dragOverEl) dragOverEl.classList.remove('drag-over');
      dragOverEl = newTarget;
      if (dragOverEl) dragOverEl.classList.add('drag-over');
    }
  });

  content.addEventListener('dragleave', e => {
    if (!content.contains(e.relatedTarget)) {
      if (dragOverEl) dragOverEl.classList.remove('drag-over');
      dragOverEl = null;
    }
  });

  content.addEventListener('drop', e => {
    e.preventDefault();
    if (dragOverEl) dragOverEl.classList.remove('drag-over');
    document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
    if (dragId) {
      const card = e.target.closest('.card[data-id]');
      const sfHeader = e.target.closest('.subfolder-header[data-subfolder]');
      const header = !sfHeader ? e.target.closest('.folder-header[data-folder]') : null;
      if (card && card.dataset.id !== dragId) {
        const srcIdx = links.findIndex(l => l.id === dragId);
        const tgtLink = links.find(l => l.id === card.dataset.id);
        const [moved] = links.splice(srcIdx, 1);
        moved.folder = tgtLink.folder || '';
        moved.subfolder = tgtLink.subfolder || null;
        const newTgt = links.findIndex(l => l.id === card.dataset.id);
        links.splice(newTgt, 0, moved);
        save(); render();
      } else if (sfHeader) {
        const srcIdx = links.findIndex(l => l.id === dragId);
        if (srcIdx > -1) {
          links[srcIdx].folder = sfHeader.dataset.folder;
          links[srcIdx].subfolder = sfHeader.dataset.subfolder;
          save(); render();
        }
      } else if (header) {
        const srcIdx = links.findIndex(l => l.id === dragId);
        if (srcIdx > -1) {
          links[srcIdx].folder = header.dataset.folder;
          links[srcIdx].subfolder = null;
          save(); render();
        }
      }
    } else if (dragFolder) {
      const header = e.target.closest('.folder-header[data-folder]');
      if (header && header.dataset.folder !== dragFolder) {
        const names = getOrderedFolders(allFolders());
        const si = names.indexOf(dragFolder), ti = names.indexOf(header.dataset.folder);
        if (si > -1 && ti > -1) {
          names.splice(si, 1);
          names.splice(ti, 0, dragFolder);
          folderOrder = names;
          localStorage.setItem('msp-folder-order', JSON.stringify(folderOrder));
          render();
        }
      }
    }
    dragId = null; dragFolder = null; dragOverEl = null;
  });

  content.addEventListener('dragend', () => {
    dragId = null; dragFolder = null;
    if (dragOverEl) dragOverEl.classList.remove('drag-over');
    dragOverEl = null;
    document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
  });
}

function exportLinks() {
  const rows = links.map(l => {
    const folder = l.folder || '';
    return { url: l.url, title: l.title, folder };
  });
  const folders = [...new Set(rows.map(r => r.folder))];
  let inner = '';
  folders.forEach(f => {
    const items = rows.filter(r => r.folder === f);
    const xmlEsc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const itemsHtml = items.map(r => `        <DT><A HREF="${xmlEsc(r.url)}">${xmlEsc(r.title)}</A>`).join('\n');
    if (f) {
      inner += `    <DT><H3>${xmlEsc(f)}</H3>\n    <DL><p>\n${itemsHtml}\n    </DL><p>\n`;
    } else {
      inner += itemsHtml + '\n';
    }
  });
  const html = `<!DOCTYPE NETSCAPE-Bookmark-file-1>\n<META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=UTF-8">\n<TITLE>Bookmarks</TITLE>\n<H1>Bookmarks</H1>\n<DL><p>\n${inner}</DL>`;
  const blob = new Blob([html], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'msp-beacon-bookmarks.html';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('Bookmarks exported');
}

const style = document.createElement('style');
style.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
document.head.appendChild(style);

function toggleFavorite(id) {
  const l = links.find(x => x.id === id);
  if (!l) return;
  l.favorite = !l.favorite;
  save(); render();
}

function toggleFavorites() {
  favoritesCollapsed = !favoritesCollapsed;
  localStorage.setItem('msp-fav-collapsed', JSON.stringify(favoritesCollapsed));
  render();
}

function toggleSelectMode() {
  selectMode = !selectMode;
  selectedIds.clear();
  document.getElementById('selectBtn').classList.toggle('active', selectMode);
  document.getElementById('bulkBar').classList.toggle('hidden', !selectMode);
  render();
  if (selectMode) updateBulkBar();
}

function exitSelectMode() {
  selectMode = false;
  selectedIds.clear();
  document.getElementById('selectBtn').classList.remove('active');
  document.getElementById('bulkBar').classList.add('hidden');
  render();
}

function toggleSelect(id) {
  if (selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  const card = document.querySelector(`.card[data-id="${id}"]`);
  if (card) {
    const sel = selectedIds.has(id);
    card.classList.toggle('selected', sel);
    const chk = card.querySelector('.card-check');
    if (chk) chk.classList.toggle('checked', sel);
  }
  updateBulkBar();
}

function selectAllVisible() {
  visibleIds.forEach(id => selectedIds.add(id));
  render(); updateBulkBar();
}

function clearSelection() {
  selectedIds.clear();
  render(); updateBulkBar();
}

function updateBulkBar() {
  const n = selectedIds.size;
  document.getElementById('bulkCount').textContent = n + ' selected';
  const mf = document.getElementById('bulkMoveFolder');
  mf.innerHTML = '<option value="">Move to folder…</option>'
    + allFolders().map(f => `<option value="${esc(f)}">${esc(f)}</option>`).join('')
    + '<option value="__none__">— Remove from folder</option>';
  document.getElementById('bulkMoveSubfolder').style.display = 'none';
  document.getElementById('bulkMoveConfirm').style.display = 'none';
  document.getElementById('bulkMoveSubfolder').value = '';
}

function onBulkFolderChange(sel) {
  if (!sel.value || sel.value === '__none__') {
    if (sel.value === '__none__' && selectedIds.size) {
      const n = selectedIds.size;
      links.forEach(l => { if (selectedIds.has(l.id)) { l.folder = ''; l.subfolder = null; } });
      sel.value = '';
      document.getElementById('bulkMoveSubfolder').style.display = 'none';
      document.getElementById('bulkMoveConfirm').style.display = 'none';
      save(); render(); updateBulkBar();
      showToast(`${n} link${n > 1 ? 's' : ''} moved`);
    } else {
      document.getElementById('bulkMoveSubfolder').style.display = 'none';
      document.getElementById('bulkMoveConfirm').style.display = 'none';
    }
    return;
  }
  const folder = sel.value;
  const subs = subfoldersByFolder(folder);
  const dl = document.getElementById('bulkSubfolderList');
  dl.innerHTML = subs.map(s => `<option value="${esc(s)}">`).join('');
  document.getElementById('bulkMoveSubfolder').style.display = '';
  document.getElementById('bulkMoveSubfolder').value = '';
  document.getElementById('bulkMoveConfirm').style.display = 'flex';
}

function confirmBulkMove() {
  const sel = document.getElementById('bulkMoveFolder');
  if (!sel.value || !selectedIds.size) { sel.value = ''; return; }
  const n = selectedIds.size;
  const folder = sel.value;
  const subfolder = document.getElementById('bulkMoveSubfolder').value.trim() || null;
  links.forEach(l => { if (selectedIds.has(l.id)) { l.folder = folder; l.subfolder = subfolder; } });
  sel.value = '';
  document.getElementById('bulkMoveSubfolder').style.display = 'none';
  document.getElementById('bulkMoveConfirm').style.display = 'none';
  save(); render(); updateBulkBar();
  showToast(`${n} link${n > 1 ? 's' : ''} moved`);
}

function bulkDelete() {
  if (!selectedIds.size) return;
  const n = selectedIds.size;
  if (pendingDelete) { clearTimeout(pendingDelete.timer); save(); }
  const saved = links.slice();
  links = links.filter(l => !selectedIds.has(l.id));
  selectedIds.clear();
  render(); updateBulkBar();
  pendingDelete = {
    saved,
    timer: setTimeout(() => { pendingDelete = null; save(); }, 5000)
  };
  showUndoToast(`${n} link${n > 1 ? 's' : ''} deleted — Undo?`);
}


function bulkAddTag() {
  const input = document.getElementById('bulkTagInput');
  const tag = input.value.trim();
  if (!tag || !selectedIds.size) return;
  const n = selectedIds.size;
  links.forEach(l => {
    if (selectedIds.has(l.id) && !(l.tags || []).includes(tag))
      l.tags = [...(l.tags || []), tag];
  });
  input.value = '';
  save(); render(); updateBulkBar();
  showToast(`Tag "${tag}" added to ${n} link${n > 1 ? 's' : ''}`);
}

async function checkLinks() {
  const btn = document.getElementById('checkLinksBtn');
  if (!btn || btn.disabled) return;
  const ids = visibleIds.length ? visibleIds : links.map(l => l.id);
  if (!ids.length) { showToast('No links to check'); return; }
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader" style="animation:spin 1s linear infinite"></i> Checking…';
  try {
    const params = ids.length ? '?ids=' + ids.map(encodeURIComponent).join(',') : '';
    const res = await fetch('/api/check-links' + params);
    if (!res.ok) throw new Error('Server error ' + res.status);
    const data = await res.json();
    Object.assign(linkStatus, data);
    render();
    const broken = Object.values(data).filter(s => s === 'broken' || s === 'timeout').length;
    if (broken === 0) showToast('All links OK');
    else showToast(`${broken} broken link${broken > 1 ? 's' : ''} found`, true);
  } catch (e) {
    showToast('Link check failed', true);
  }
  btn.disabled = false;
  btn.innerHTML = '<i class="ti ti-wifi"></i> Check links';
}

applyTheme(localStorage.getItem('msp-theme') || 'Green');
setupCardListeners();
setupDragListeners();
loadLinks();
</script>
